<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />

<title>杨站长工作台 v16</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--line:#e6ebf2;--text:#172033;--muted:#667085;--weak:#98a2b3;--blue:#1769e0;--blue-bg:#eef5ff;--red:#dc2626;--red-bg:#fff1f2;--orange:#f59e0b;--orange-bg:#fff7e6;--green:#16a36a;--green-bg:#e9f8f1;--purple:#7c3aed;--purple-bg:#f4edff;--shadow:0 14px 36px rgba(20,40,80,.075)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;color:var(--text)}
.app{width:1440px;height:900px;margin:0 auto;padding:18px;overflow:hidden}.top{height:72px;border-radius:24px;background:linear-gradient(135deg,#102b5b,#1457c6 58%,#1684e8);color:#fff;padding:0 22px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow)}
.brand{display:flex;align-items:center;gap:12px}.logo{width:42px;height:42px;border-radius:15px;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;font-weight:900}.brand h1{margin:0;font-size:22px}.brand span{font-size:13px;color:rgba(255,255,255,.75)}.top-right{display:flex;gap:9px;align-items:center}.pill{padding:8px 11px;border-radius:999px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.20);font-size:12.5px}.btn-top{border:none;background:#fff;color:#1457c6;border-radius:999px;padding:9px 13px;font-weight:800;cursor:pointer}
.main{height:calc(900px - 104px);margin-top:14px;display:grid;grid-template-columns:300px 1fr 330px;gap:14px;min-height:0}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:0 8px 22px rgba(20,40,80,.045)}.left,.center,.right{min-height:0;display:flex;flex-direction:column;gap:12px}
.badge{display:inline-flex;align-items:center;border-radius:999px;padding:5px 8px;font-size:12px;font-weight:850;white-space:nowrap}.badge.blue{background:var(--blue-bg);color:var(--blue)}.badge.green{background:var(--green-bg);color:var(--green)}.badge.orange{background:var(--orange-bg);color:#b45309}.badge.red{background:var(--red-bg);color:var(--red)}.badge.purple{background:var(--purple-bg);color:var(--purple)}.badge.gray{background:#f2f4f7;color:#667085}
.scene-head{padding:16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.scene-head h2{margin:0;font-size:17px}.scene-list{padding:12px;overflow:auto;min-height:0;flex:1}.scene{border:1px solid var(--line);border-radius:17px;padding:13px;margin-bottom:10px;cursor:pointer;background:#fff;transition:.16s}.scene:hover{border-color:#a9ceff;background:#f8fbff}.scene.active{border-color:#67a4ff;background:#f4f9ff;box-shadow:0 8px 18px rgba(23,105,224,.08)}.scene-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.scene-name{font-size:14.5px;font-weight:900;line-height:1.35}.scene-time{margin-top:7px;font-size:12.5px;color:var(--muted)}.scene-stat{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
.result{flex:1;min-height:0;overflow:auto;padding:22px}.result-head{display:flex;justify-content:space-between;gap:20px;border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:18px}.result-head h2{margin:0 0 7px;font-size:30px;letter-spacing:-.5px}.result-head p{margin:0;font-size:13px;color:var(--muted)}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}.kpi{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff}.kpi .label{font-size:12px;color:var(--muted);margin-bottom:8px}.kpi .value{font-size:25px;font-weight:950}.kpi .note{font-size:12px;color:var(--weak);margin-top:6px;line-height:1.35}.judge{border:1px solid #d7e6ff;border-radius:20px;background:linear-gradient(135deg,#f2f7ff,#fff);padding:17px;margin-bottom:14px}.judge h3{margin:0 0 10px;font-size:17px}.judge p{margin:0;font-size:14.5px;line-height:1.7;color:#344054}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.panel{border:1px solid var(--line);border-radius:20px;background:#fff;padding:16px}.panel h3{margin:0 0 10px;font-size:16px}.table{width:100%;border-collapse:separate;border-spacing:0 8px;font-size:12.8px}.table th{text-align:left;color:var(--weak);font-size:12px;padding:0 8px}.table td{background:#fbfcff;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:9px 8px;color:#344054}.table td:first-child{border-left:1px solid var(--line);border-radius:11px 0 0 11px;font-weight:850;color:#172033}.table td:last-child{border-right:1px solid var(--line);border-radius:0 11px 11px 0}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:15px}.btn{border:none;border-radius:13px;background:#f2f4f7;color:#344054;padding:10px 12px;font-size:13px;font-weight:850;cursor:pointer}.btn.primary{background:var(--blue);color:#fff}.btn.warn{background:var(--orange-bg);color:#b45309}
.settings{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column}.set-head{padding:16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}.set-head h2{margin:0;font-size:17px}.tabs{display:flex;gap:6px;padding:12px;border-bottom:1px solid var(--line)}.tab{border:none;border-radius:999px;padding:8px 10px;background:#f2f4f7;color:#344054;font-size:12px;font-weight:850;cursor:pointer}.tab.active{background:var(--blue);color:#fff}.set-body{padding:16px;overflow:auto}.field{margin-bottom:14px}.field label{display:block;font-size:12px;color:var(--muted);font-weight:850;margin-bottom:7px}.input,textarea,select{width:100%;border:1px solid var(--line);border-radius:14px;background:#fbfcff;padding:10px 12px;font-size:13px;color:#344054;outline:none;font-family:inherit}textarea{height:116px;line-height:1.55;resize:none}.spec{border:1px solid var(--line);background:#fbfcff;border-radius:16px;padding:12px;font-size:12.8px;color:#344054;line-height:1.65}.spec b{color:#172033}
.chat{height:208px;display:flex;flex-direction:column;overflow:hidden}.chat-body{flex:1;padding:12px;background:#fbfcff;overflow:auto}.msg{display:flex;margin-bottom:9px}.msg.agent{justify-content:flex-start}.msg.user{justify-content:flex-end}.bubble{max-width:92%;border-radius:15px;padding:9px 11px;font-size:12.8px;line-height:1.55}.agent .bubble{background:#fff;border:1px solid var(--line)}.user .bubble{background:var(--blue);color:#fff}.quick{padding:10px;border-top:1px solid var(--line);display:flex;gap:7px;flex-wrap:wrap;background:#fff}.quick button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 9px;font-size:12px;cursor:pointer;color:#344054}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#111827;color:#fff;border-radius:999px;padding:12px 16px;font-size:13px;display:none;box-shadow:0 12px 30px rgba(0,0,0,.2)}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#d0d5dd;border-radius:999px}
</style>
</head><body>
<div class="app"><header class="top"><div class="brand"><div class="logo">AI</div><div><h1>杨站长工作台</h1><span>良渚街道应急消防工作站</span></div></div><div class="top-right"><span class="pill">09:42 已更新</span><span class="pill">站长</span><button class="btn-top">新建场景</button></div></header>
<main class="main"><section class="left card"><div class="scene-head"><h2>智能场景</h2><span class="badge green">运行中</span></div><div id="sceneList" class="scene-list"></div></section><section class="center card"><div id="result" class="result"></div></section><section class="right"><div class="card settings"><div class="set-head"><h2>场景设置</h2><span id="setStatus" class="badge gray">当前场景</span></div><div class="tabs"><button id="tabSpec" class="tab active" onclick="setTab('spec')">规格</button><button id="tabTrigger" class="tab" onclick="setTab('trigger')">触发</button><button id="tabPrompt" class="tab" onclick="setTab('prompt')">提示词</button></div><div id="setBody" class="set-body"></div></div><div class="card chat"><div id="chatBody" class="chat-body"></div><div class="quick"><button onclick="cmd('主体责任放前面')">主体责任放前面</button><button onclick="cmd('改成16点生成')">改成16点</button><button onclick="cmd('只超期提醒')">只超期提醒</button></div></div></section></main></div><div class="toast" id="toast"></div>
<script>
const scenes={morning:{name:'晨间简报',tag:'默认',type:'blue',status:'09:42 已生成',trigger:'每日 09:30',desc:'态势、闭环、进展、责任',prompt:'每天早上先看整体安全态势、关键风险闭环、核心任务进展和主体责任落实。先给结论，再给证据，重点问题直接列清单。',spec:['目标：判断今日是否需要督办、协调或下钻','数据：风险、隐患、任务、专项、企业自查','结构：态势 / 闭环 / 进展 / 责任','排序：重大隐患 > 风险上升 > 进度落后 > 主体异常'],kpi:[['新增隐患','37处','勾庄、物流集中'],['重大未闭环','5项','2项临期'],['专项进度','51%','低于时间进度'],['自查有效性','24%','偏低']],judge:'今天整体平稳，但建议优先盯住重大隐患闭环、村社侧任务推进和企业自查有效性。',table:[['重大隐患闭环','5项未闭环','今日督办'],['村社任务推进','43%','低于进度'],['主体责任落实','自查占比24%','关注质量']],actions:['下钻未闭环','生成督办通知','加入周会']},chemical:{name:'危化专项跟进',tag:'专项',type:'purple',status:'16:00 待生成',trigger:'每日 16:00',desc:'进度、整改、复核',prompt:'本周重点关注危化使用企业专项检查，尤其是勾庄片区、整改临期企业和专家复核积压。',spec:['目标：跟进危化专项推进','数据：专项任务、主体对象、隐患整改、专家复核','结构：总体进度 / 落后片区 / 临期企业 / 复核积压','排序：重大隐患 > 整改临期 > 片区落后 > 复核积压'],kpi:[['覆盖企业','112家','3/1-5/1'],['已检查','57家','50.9%'],['勾庄片区','11/24','偏慢'],['整改临期','3家','需复核']],judge:'危化专项低于时间进度，主要问题集中在勾庄片区进度偏慢和整改临期企业复核安排不足。',table:[['勾庄片区','应查24/已查11','补进度'],['整改临期企业','3家','安排复核'],['专家复核积压','2项','核实原因']],actions:['下钻企业','生成专项督办','发起核实']},hazard:{name:'重大隐患闭环',tag:'紧急',type:'red',status:'2项需督办',trigger:'事件触发',desc:'未闭环、临期、超期',prompt:'重大隐患未闭环、临期或超期时提醒我，重点列出责任对象、整改进度和复查状态。',spec:['目标：盯重大隐患闭环','数据：隐患、复查、期限、责任对象','结构：未闭环 / 临期 / 超期 / 责任线','排序：超期 > 临期 > 反复 > 待复查'],kpi:[['未闭环','5项','2项临期'],['已超期','1项','需督办'],['待复查','2项','专家介入'],['反复问题','2类','电动车/通道']],judge:'消防通道堵塞已超期，自动消防设施失效待复查，该场景今日优先级高。',table:[['消防通道堵塞','超期','消防安全组'],['自动消防设施失效','待复查','物业/专家'],['电动车违规停放','反复','村社消防线']],actions:['生成督办通知','安排复查','加入周会']},village:{name:'村社任务推进',tag:'推进',type:'orange',status:'3个村社落后',trigger:'一/三/五 09:00',desc:'村社、网格、反馈',prompt:'盯村社侧任务推进，发现低于时间进度、未响应、逾期未反馈的村社，给出清单和建议动作。',spec:['目标：识别村社推进滞后','数据：村社任务、网格反馈、催办记录','结构：总体进度 / 落后村社 / 未响应对象','排序：落后最多 > 未响应 > 逾期未反馈'],kpi:[['时间进度','63%','本月基准'],['村社推进','43%','明显落后'],['落后村社','3个','需提醒'],['未响应','128户','需催办']],judge:'当前主要不是政府侧任务总量不足，而是基层末端反馈和企业自查推进偏慢。',table:[['A村','39%','低于进度'],['B社区','41%','未响应较多'],['C网格','44%','需补进度']],actions:['生成提醒','下钻村社','加入周会']},responsibility:{name:'主体责任分析',tag:'分析',type:'green',status:'周五生成',trigger:'周五 15:00',desc:'自查、培训、质量',prompt:'每周看企业自查是不是真实有效，把政府检查隐患多、企业自查隐患少的主体对象筛出来。',spec:['目标：评估主体责任落实质量','数据：企业自查、政府检查、培训、平台使用','结构：自查有效性 / 差异企业 / 培训异常','排序：政府检查多自查少 > 连续零隐患 > 培训未完成'],kpi:[['自查隐患','216处','偏少'],['政府隐患','684处','差异明显'],['自查占比','24%','需关注'],['疑似敷衍','12家','待核实']],judge:'不能只看企业有没有提交自查，还要看自查质量。部分主体对象可能存在走过场。',table:[['某企业','政府查12/自查0','疑似走过场'],['某场所','连续3次零隐患','需复核'],['某园区','培训未完成','提醒']],actions:['筛出企业','生成培训提醒','纳入清单']}};
let current='morning',tab='spec';function badge(t,type){return `<span class="badge ${type}">${t}</span>`}function renderScenes(){document.getElementById('sceneList').innerHTML=Object.entries(scenes).map(([k,s])=>`<div class="scene ${k===current?'active':''}" onclick="selectScene('${k}')"><div class="scene-top"><div class="scene-name">${s.name}</div>${badge(s.tag,s.type)}</div><div class="scene-time">${s.status} · ${s.trigger}</div><div class="scene-stat">${badge(s.desc,'gray')}</div></div>`).join('')}function renderResult(){let s=scenes[current];document.getElementById('result').innerHTML=`<div class="result-head"><div><h2>${s.name}</h2><p>${s.status}｜${s.trigger}</p></div>${badge('已生成结果','green')}</div><div class="kpis">${s.kpi.map(x=>`<div class="kpi"><div class="label">${x[0]}</div><div class="value">${x[1]}</div><div class="note">${x[2]}</div></div>`).join('')}</div><div class="judge"><h3>Agent 判断</h3><p>${s.judge}</p></div><div class="grid"><div class="panel"><h3>重点清单</h3><table class="table"><tr><th>对象</th><th>状态</th><th>建议</th></tr>${s.table.map(x=>`<tr><td>${x[0]}</td><td>${x[1]}</td><td>${x[2]}</td></tr>`).join('')}</table></div><div class="panel"><h3>建议动作</h3><div class="actions">${s.actions.map(a=>`<button class="btn ${a.includes('督办')||a.includes('周会')?'primary':'warn'}" onclick="action('${a}')">${a}</button>`).join('')}</div></div></div>`}function renderSettings(){let s=scenes[current];document.getElementById('setStatus').textContent=s.name;document.getElementById('tabSpec').className='tab '+(tab==='spec'?'active':'');document.getElementById('tabTrigger').className='tab '+(tab==='trigger'?'active':'');document.getElementById('tabPrompt').className='tab '+(tab==='prompt'?'active':'');let b=document.getElementById('setBody');if(tab==='spec'){b.innerHTML=`<div class="spec">${s.spec.map(x=>`<div><b>${x.split('：')[0]}：</b>${x.split('：').slice(1).join('：')}</div>`).join('<br>')}</div>`}else if(tab==='trigger'){b.innerHTML=`<div class="field"><label>触发方式</label><select><option>定时触发</option><option>事件触发</option><option>定时 + 事件触发</option></select></div><div class="field"><label>运行时间</label><input class="input" value="${s.trigger}"></div><div class="field"><label>触发条件</label><textarea>重大隐患超期；专项进度落后；任务低于时间进度；出现待核实原因。</textarea></div><button class="btn primary" onclick="save('触发设置已保存')">保存</button>`}else{b.innerHTML=`<div class="field"><label>自然语言目标</label><textarea>${s.prompt}</textarea></div><div class="field"><label>输出要求</label><textarea>先结论后证据；重点问题列清单；普通统计不展开；原因不明时标记待核实。</textarea></div><button class="btn primary" onclick="save('提示词已保存')">保存</button>`}}function selectScene(k){current=k;renderScenes();renderResult();renderSettings();addMsg('agent','已切换到「'+scenes[k].name+'」。')}function setTab(t){tab=t;renderSettings()}function addMsg(role,text){let box=document.getElementById('chatBody');let div=document.createElement('div');div.className='msg '+role;div.innerHTML='<div class="bubble">'+text+'</div>';box.appendChild(div);box.scrollTop=box.scrollHeight}function cmd(text){addMsg('user',text);if(text.includes('16')){scenes[current].trigger='每日 16:00';tab='trigger';renderScenes();renderResult();renderSettings();addMsg('agent','已更新触发时间。');toast('已保存')}else if(text.includes('主体')){scenes.morning.spec[3]='排序：主体责任异常 > 重大隐患 > 风险上升 > 进度落后';current='morning';tab='spec';renderScenes();renderResult();renderSettings();addMsg('agent','已把主体责任前置。');toast('已保存')}else{scenes[current].trigger='仅超期事件触发';tab='trigger';renderScenes();renderResult();renderSettings();addMsg('agent','已改为超期事件触发。');toast('已保存')}}function action(a){addMsg('user',a);addMsg('agent','已生成：'+a);toast(a+' 已生成')}function save(t){toast(t);addMsg('agent',t)}function toast(t){let e=document.getElementById('toast');e.textContent=t;e.style.display='block';setTimeout(()=>e.style.display='none',2000)}function init(){renderScenes();renderResult();renderSettings();addMsg('agent','默认展示晨间简报。可切换场景或调整规则。')}init();
</script></body></html>
