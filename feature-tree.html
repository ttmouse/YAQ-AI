<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YAQ-AI 功能清单 · 移动端首期范围定义</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ===== DESIGN TOKENS ===== */
    :root {
      --c-bg: #f0f2f5;
      --c-surface: #ffffff;
      --c-border: #e2e6ed;
      --c-border-light: #f0f2f5;
      --c-text: #1a1d23;
      --c-text-secondary: #6b7280;
      --c-text-muted: #9ca3af;
      --c-primary: #2563eb;
      --c-primary-light: #dbeafe;
      --c-green: #16a34a;
      --c-green-light: #dcfce7;
      --c-green-bg: #f0fdf4;
      --c-amber: #d97706;
      --c-amber-light: #fef3c7;
      --c-amber-bg: #fffbeb;
      --c-red: #dc2626;
      --c-red-light: #fee2e2;
      --c-red-bg: #fef2f2;
      --c-purple: #7c3aed;
      --c-purple-light: #ede9fe;
      --c-purple-bg: #f5f3ff;
      --radius: 10px;
      --radius-sm: 6px;
      --radius-lg: 14px;
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.07);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.10);
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
      --transition: 0.18s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--c-bg);
      color: var(--c-text);
      line-height: 1.5;
      padding: 20px 16px 40px;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    .header {
      max-width: 1400px;
      margin: 0 auto 16px;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 14px;
    }
    .header-info { flex: 1; min-width: 260px; }
    .header-info h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .header-info h1 .badge {
      font-size: 12px;
      font-weight: 600;
      background: var(--c-primary-light);
      color: var(--c-primary);
      padding: 2px 10px;
      border-radius: 999px;
    }
    .header-info p { color: var(--c-text-secondary); margin-top: 3px; font-size: 14px; }
    .header-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .header-actions button, .header-actions .file-btn {
      padding: 7px 14px;
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      background: var(--c-surface);
      font-size: 13px;
      font-family: var(--font);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      color: var(--c-text-secondary);
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .header-actions button:hover { border-color: var(--c-primary); color: var(--c-primary); background: #fafbfc; }
    .header-actions .save-indicator { font-size: 13px; color: var(--c-text-muted); }

    /* ===== STATS BAR ===== */
    .stats {
      max-width: 1400px;
      margin: 0 auto 16px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 8px;
    }
    .stat-card {
      background: var(--c-surface);
      border-radius: var(--radius);
      padding: 12px 14px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .stat-card .num { font-size: 24px; font-weight: 700; line-height: 1.2; }
    .stat-card .label { font-size: 11px; color: var(--c-text-secondary); margin-top: 2px; }
    .stat-card.p1 .num { color: var(--c-green); }
    .stat-card.p2 .num { color: var(--c-amber); }
    .stat-card.out .num { color: var(--c-red); }
    .stat-card.arch .num { color: var(--c-purple); }

    /* ===== SEARCH BAR ===== */
    .toolbar {
      max-width: 1400px;
      margin: 0 auto 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .search-wrap { flex: 1; min-width: 200px; position: relative; }
    .search-wrap input {
      width: 100%;
      padding: 9px 14px 9px 36px;
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: var(--font);
      background: var(--c-surface);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-wrap input:focus { border-color: var(--c-primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12); }
    .search-wrap .icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--c-text-muted); font-size: 14px; }
    .toolbar .hint { font-size: 12px; color: var(--c-text-muted); white-space: nowrap; }

    /* ===== KANBAN BOARD ===== */
    .board {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      min-height: 60vh;
    }
    @media (max-width: 900px) {
      .board { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      .board { grid-template-columns: 1fr; }
    }

    /* ===== COLUMN (SWIMLANE) ===== */
    .column {
      background: var(--c-surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-height: 300px;
      transition: background var(--transition), box-shadow var(--transition);
      position: relative;
    }
    .column.drag-over {
      background: #f8faff;
      box-shadow: var(--shadow-md), 0 0 0 2px var(--c-primary);
    }
    .column-header {
      padding: 14px 16px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 2px solid var(--c-border-light);
      flex-shrink: 0;
    }
    .column-header .dot {
      width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
    }
    .column-header .dot.p1 { background: var(--c-green); }
    .column-header .dot.p2 { background: var(--c-amber); }
    .column-header .dot.out { background: var(--c-red); }
    .column-header .dot.arch { background: var(--c-purple); }
    .column-header .col-title { font-size: 15px; font-weight: 600; }
    .column-header .col-count {
      font-size: 12px;
      color: var(--c-text-muted);
      background: var(--c-bg);
      padding: 1px 9px;
      border-radius: 999px;
      margin-left: auto;
      font-weight: 600;
    }
    .column-body {
      flex: 1;
      padding: 10px 12px 12px;
      overflow-y: auto;
      min-height: 120px;
      transition: background var(--transition);
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    }
    .column.drag-over .column-body { background: rgba(37, 99, 235, 0.04); }
    .column-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100px;
      color: var(--c-text-muted);
      font-size: 13px;
      border: 2px dashed var(--c-border);
      border-radius: var(--radius);
      margin: 4px 0;
      transition: all var(--transition);
    }
    .column.drag-over .column-empty { border-color: var(--c-primary); color: var(--c-primary); }

    /* ===== FEATURE CARD ===== */
    .card {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: grab;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      position: relative;
      user-select: none;
    }
    .card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }
    .card:active, .card.dragging {
      cursor: grabbing;
      opacity: 0.5;
      transform: scale(0.97);
      box-shadow: var(--shadow-lg);
    }
    .card .cat-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 8px;
      border-radius: 999px;
      background: var(--c-bg);
      color: var(--c-text-secondary);
      margin-bottom: 5px;
    }
    .card .card-name {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
    }
    .card .card-desc {
      font-size: 12px;
      color: var(--c-text-muted);
      margin-top: 3px;
      line-height: 1.5;
    }
    .card .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .card .sub-badge {
      font-size: 10px;
      color: var(--c-text-muted);
      background: var(--c-bg);
      padding: 2px 7px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }
    .card .sub-badge i { font-size: 9px; }
    .card .subs-area {
      margin-top: 8px;
      border-top: 1px dashed var(--c-border);
      padding-top: 6px;
      display: none;
    }
    .card .subs-area.open { display: block; }
    .card .sub-toggle {
      font-size: 11px;
      color: var(--c-primary);
      cursor: pointer;
      user-select: none;
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }
    .card .sub-toggle:hover { text-decoration: underline; }
    .card .sub-item {
      font-size: 12px;
      padding: 3px 0 3px 12px;
      border-left: 2px solid var(--c-border);
      margin: 2px 0 2px 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card .sub-item .sub-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .card .sub-item .sub-dot.p1 { background: var(--c-green); }
    .card .sub-item .sub-dot.p2 { background: var(--c-amber); }
    .card .sub-item .sub-dot.out { background: var(--c-red); }
    .card .sub-item .sub-dot.arch { background: var(--c-purple); }

    /* Card scope accent border */
    .card.card-p1 { border-left: 3px solid var(--c-green); }
    .card.card-p2 { border-left: 3px solid var(--c-amber); }
    .card.card-out { border-left: 3px solid var(--c-red); }
    .card.card-arch { border-left: 3px solid var(--c-purple); }

    .card.hidden { display: none; }

    /* ===== SUMMARY ===== */
    .summary {
      max-width: 1400px;
      margin: 20px auto 0;
      background: var(--c-surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 24px;
    }
    .summary h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }
    .summary-card {
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
    }
    .summary-card .num { font-size: 20px; font-weight: 700; }
    .summary-card .label { font-size: 12px; color: var(--c-text-secondary); margin-top: 2px; }
    .summary-card p { font-size: 12px; color: var(--c-text-muted); margin-top: 4px; line-height: 1.5; }
    .summary-card.in .num { color: var(--c-green); }
    .summary-card.out .num { color: var(--c-red); }
    .summary-card.p2 .num { color: var(--c-amber); }
    .summary-card.maybe .num { color: var(--c-purple); }

    /* ===== DRAG GHOST ===== */
    .dragging-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      background: var(--c-surface);
      border: 2px solid var(--c-primary);
      border-radius: var(--radius);
      padding: 12px 16px;
      box-shadow: var(--shadow-lg);
      max-width: 280px;
      opacity: 0.92;
      font-size: 14px;
      font-weight: 600;
    }

    /* ===== TOAST ===== */
    .toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .toast {
      background: #1a1d23;
      color: #fff;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      animation: toastIn 0.25s ease, toastOut 0.3s ease 1.5s forwards;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(8px); } }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      body { padding: 12px 8px; }
      .header-info h1 { font-size: 20px; }
      .stat-card .num { font-size: 18px; }
      .card { padding: 10px 12px; }
      .column-header { padding: 12px 12px 8px; }
      .column-body { padding: 8px 10px 10px; }
    }

    /* ===== PRINT ===== */
    @media print {
      body { background: #fff; padding: 0; }
      .board { display: block; }
      .column { break-inside: avoid; page-break-inside: avoid; margin-bottom: 16px; }
      .card { cursor: default; }
      .card:hover { transform: none; box-shadow: none; }
    }
  </style>
</head>

  <!-- ===== HEADER ===== -->

      <button onclick="resetToDefault()" title="恢复默认"><i class="fa-solid fa-rotate-left"></i> 重置</button>

            { name: '个人积分详情', scope: 'out' },
          ]},
          { name: '督办跟踪 (Supervision Tracking)', desc: '督办列表 + 详情+ 反馈', scope: 'out', subs: [
            { name: '督办列表', scope: 'out' },
            { name: '督办详情', scope: 'out' },
            { name: '督办反馈', scope: 'out' },
          ]},
          { name: '主体责任 (Main Responsibility)', desc: '主体责任清单 + 履职记录', scope: 'out' },
          { name: '智能专项检查 (AI Inspection)', desc: '检查任务列表 + 检查表单', scope: 'out' },
          { name: '月报 (Monthly Report)', desc: '月报生成 + PDF 导出', scope: 'out' },
          { name: '隐患指标下钻', desc: '从统计卡片下钻到隐患明细', scope: 'phase2' },
          { name: '企业记忆面板 (Memory Panel)', desc: 'AI 记忆面板 — 企业与 AI 的历史对话记录、关注点', scope: 'phase2' },
          { name: 'AI 搜索启动器 (Search Launcher)', desc: '全局搜索启动 + 搜索历史', scope: 'phase2' },
          { name: '分级处置 (Graded Handling)', desc: '隐患分级处置流程', scope: 'phase2' },
          { name: '隐患回头看 (Review)', desc: '已闭环隐患复查巡检', scope: 'phase2' },
          { name: '初始化引导 (Onboarding)', desc: '清除状态、重新展示引导', scope: 'out' },
        ],
      },
      {
        name: '⚙️ 规则引擎 (Rules Engine)',
        tag: 'out',
        tagLabel: '暂不',
        scope: 'out',
        features: [
          { name: '6 大规则维度', desc: '指标阈值/时间超期/对比类/趋势类/行为模式/复合规则', scope: 'out' },
          { name: '12 条默认规则', desc: '4 指标 + 2 超期 + 2 对比 + 2 趋势 + 2 行为 + 1 复合', scope: 'out' },
          { name: '规则 CRUD', desc: '添加/删除/编辑/启停切换', scope: 'out' },
          { name: '自然语言创建规则', desc: 'NL → 结构化规则解析 + AI 预览', scope: 'out' },
        ],
      },
      {
        name: '🧩 全局功能 / 通用组件',
        tag: 'mixed',
        tagLabel: '混合',
        scope: 'phase1',
        features: [
          { name: 'Drawer 抽屉面板', desc: '侧滑面板 — 简报生成/一键督办/会议议题/现场核查/提醒/Agent配置', scope: 'phase1', subs: [
            { name: '简报生成 Drawer', scope: 'phase1' },
            { name: '一键督办 Drawer (督办包创建)', scope: 'phase1' },
            { name: '会议议题 Drawer', scope: 'phase2' },
            { name: '现场核查 Drawer', scope: 'phase2' },
          ]},
          { name: 'Action Modal 动作弹窗', desc: '确认/提示/批量操作确认弹窗', scope: 'phase1' },
          { name: 'Toast 通知系统', desc: '成功/错误/警告/信息 — 四色 Toast 浮层', scope: 'phase1' },
          { name: '企业档案面板 (Enterprise Panel)', desc: '右侧固定面板 — Tab 切换 + 企业信息 + 隐患时间线', scope: 'phase2' },
          { name: '任务详情弹窗', desc: '左右分栏 — 进度/隐患/任务信息', scope: 'phase2' },
          { name: '通知铃铛 (Notification Bell)', desc: '右上角铃铛图标 + 未读角标 (Badge) + 点击弹出通知', scope: 'phase1', subs: [
            { name: '未读角标数值展示', scope: 'phase1' },
            { name: '点击弹出通知列表/Toast', scope: 'phase1' },
          ]},
          { name: '密码保护 Gate', desc: 'Demo 访问密码验证', scope: 'phase1' },
          { name: '数据导出/分享', desc: 'Web Share API (原生分享 → 剪贴板兜底)', scope: 'phase2' },
          { name: '通用 Loading / 空状态', desc: '场景加载骨架屏 + 无数据占位', scope: 'phase1' },
          { name: '错误边界 / 异常捕获', desc: '全局错误捕获、友好的错误提示', scope: 'phase2' },
        ],
      },
    ];

    // ============================================================
    // PERSISTENCE
    // ============================================================
    let DATA;
    const STORAGE_KEY = 'yaq_feature_tree_data';

    function loadData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try { DATA = JSON.parse(saved); return; } catch(e) {}
      }
      DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
      document.getElementById('saveIndicator').textContent = '💾 已保存';
      render();
    }

    function markDirty() {
      document.getElementById('saveIndicator').textContent = '💾 未保存…';
    }

    window.resetToDefault = function() {
      if (confirm('确定恢复默认状态？所有自定义修改将丢失。')) {
        DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
        saveData();
        showToast('已恢复默认状态');
      }
    };

    // ============================================================
    // EXPORT / IMPORT
    // ============================================================
    window.exportJSON = function() {
      const blob = new Blob([JSON.stringify(DATA, null, 2)], {type: 'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'yaq-feature-tree.json';
      a.click();
      URL.revokeObjectURL(a.href);
      showToast('已导出 JSON');
    };

    window.importJSON = function(ev) {
      const file = ev.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const imported = JSON.parse(e.target.result);
          if (Array.isArray(imported) && imported.length > 0 && imported[0].features) {
            DATA = imported;
            saveData();
            showToast('已导入 ' + file.name);
          } else {
            alert('JSON 格式不正确，请导入有效的功能清单数据');
          }
        } catch(err) {
          alert('JSON 解析失败：' + err.message);
        }
      };
      reader.readAsText(file);
      ev.target.value = '';
    };

    // ============================================================
    // TOAST
    // ============================================================
    function showToast(msg) {
      const container = document.getElementById('toastContainer');
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      container.appendChild(el);
      setTimeout(() => { if (el.parentNode) el.remove(); }, 2000);
    }

    // ============================================================
    // HELPERS
    // ============================================================
    function scopeLabel(s) {
      const map = { phase1: '首期实现', phase2: '后续迭代', out: '暂不实现', arch: '架构基础' };
      return map[s] || s;
    }

    function scopeShort(s) {
      const map = { phase1: '首期', phase2: '后续', out: '暂不', arch: '架构' };
      return map[s] || s;
    }

    const SCOPE_ORDER = ['phase1', 'phase2', 'out', 'arch'];
    const SCOPE_INFO = {
      phase1: { label: '✅ 首期实现', short: '首期', dot: 'p1', css: 'card-p1', columnClass: 'col-p1' },
      phase2: { label: '⏳ 后续迭代', short: '后续', dot: 'p2', css: 'card-p2', columnClass: 'col-p2' },
      out:    { label: '❌ 暂不实现', short: '暂不', dot: 'out', css: 'card-out', columnClass: 'col-out' },
      arch:   { label: '🔧 架构基础', short: '架构', dot: 'arch', css: 'card-arch', columnClass: 'col-arch' },
    };

    // ============================================================
    // DRAG & DROP
    // ============================================================
    let dragData = null;

    function handleDragStart(e, catIdx, featIdx) {
      dragData = { catIdx, featIdx };
      e.dataTransfer.effectAllowed = 'move';
      // Store the feature name for the drag ghost
      const feature = DATA[catIdx].features[featIdx];
      e.dataTransfer.setData('text/plain', feature.name);
      // Add dragging class after a tick so the browser captures the screenshot before we dim it
      requestAnimationFrame(() => {
        e.target.classList.add('dragging');
      });
    }

    function handleDragEnd(e) {
      e.target.classList.remove('dragging');
      dragData = null;
      document.querySelectorAll('.column').forEach(col => col.classList.remove('drag-over'));
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    }

    function handleDragEnter(e, targetScope) {
      e.preventDefault();
      const col = e.currentTarget;
      col.classList.add('drag-over');
    }

    function handleDragLeave(e) {
      const col = e.currentTarget;
      // Only remove if we're actually leaving the column (not entering a child)
      if (!col.contains(e.relatedTarget)) {
        col.classList.remove('drag-over');
      }
    }

    function handleDrop(e, targetScope) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');

      if (!dragData) return;

      const { catIdx, featIdx } = dragData;
      const feature = DATA[catIdx].features[featIdx];
      const oldScope = feature.scope;

      if (oldScope === targetScope) return; // dropped in same column

      feature.scope = targetScope;

      // Update sub-items scope to match (keep subs with individual scope as-is but default to parent)
      // We keep subs' individual scopes - they stay as they were

      markDirty();
      saveData();
      showToast(`「${feature.name}」→ ${scopeLabel(targetScope)}`);
    }

    // ============================================================
    // RENDER
    // ============================================================
    function render() {
      const board = document.getElementById('board');
      board.innerHTML = '';

      // Compute stats
      let totalP1 = 0, totalP2 = 0, totalOut = 0, totalArch = 0, totalAll = 0;
      const catMap = {}; // cache category name by feature key

      DATA.forEach((cat, ci) => {
        cat.features.forEach((f, fi) => {
          totalAll++;
          if (f.scope === 'phase1') totalP1++;
          else if (f.scope === 'phase2') totalP2++;
          else if (f.scope === 'out') totalOut++;
          else if (f.scope === 'arch') totalArch++;
          if (f.subs) f.subs.forEach(s => {
            totalAll++;
            if (s.scope === 'phase1') totalP1++;
            else if (s.scope === 'phase2') totalP2++;
            else if (s.scope === 'out') totalOut++;
            else if (s.scope === 'arch') totalArch++;
          });
        });
      });

      // Stats bar
      document.getElementById('statsBar').innerHTML = `
        <div class="stat-card p1"><div class="num">${totalP1}</div><div class="label">✅ 首期实现</div></div>
        <div class="stat-card p2"><div class="num">${totalP2}</div><div class="label">⏳ 后续迭代</div></div>
        <div class="stat-card out"><div class="num">${totalOut}</div><div class="label">❌ 暂不实现</div></div>
        <div class="stat-card arch"><div class="num">${totalArch}</div><div class="label">🔧 架构基础</div></div>
        <div class="stat-card"><div class="num">${totalAll}</div><div class="label">📦 功能项总计</div></div>
      `;

      // Build columns
      SCOPE_ORDER.forEach(scopeKey => {
        const info = SCOPE_INFO[scopeKey];
        const col = document.createElement('div');
        col.className = `column ${info.columnClass}`;
        col.setAttribute('data-scope', scopeKey);

        // Collect cards for this scope
        let cardsHtml = '';
        let cardCount = 0;

        DATA.forEach((cat, ci) => {
          cat.features.forEach((f, fi) => {
            if (f.scope !== scopeKey) return;
            cardCount++;
            cardsHtml += renderCard(f, ci, fi, cat.name);
          });
        });

        const isEmpty = cardCount === 0;

        col.innerHTML = `
          <div class="column-header">
            <span class="dot ${info.dot}"></span>
            <span class="col-title">${info.label}</span>
            <span class="col-count">${cardCount}</span>
          </div>
          <div class="column-body"
               data-scope="${scopeKey}"
               ondragover="handleDragOver(event)"
               ondragenter="handleDragEnter(event, '${scopeKey}')"
               ondragleave="handleDragLeave(event)"
               ondrop="handleDrop(event, '${scopeKey}')">
            ${isEmpty ? `<div class="column-empty">拖拽功能卡片到这里</div>` : cardsHtml}
          </div>
        `;

        board.appendChild(col);
      });

      // Summary
      document.getElementById('summarySection').innerHTML = `
        <h3>📌 首期移动端范围边界总结</h3>
        <div class="summary-grid">
          <div class="summary-card in">
            <div class="num">${totalP1}</div>
            <div class="label">✅ 首期实现</div>
            <p>工作台、隐患整改、持续跟踪、待确认、AI 全局助手、导航、Skeleton、Drawer、Toast</p>
          </div>
          <div class="summary-card p2">
            <div class="num">${totalP2}</div>
            <div class="label">⏳ 后续迭代</div>
            <p>分级处置、隐患回头看、指标下钻、记忆面板、企业档案面板、搜索启动器</p>
          </div>
          <div class="summary-card out">
            <div class="num">${totalOut}</div>
            <div class="label">❌ 首期不做</div>
            <p>督办跟踪、履职效能、主体责任、智能专项检查、月报、规则引擎、初始化引导、底部导航、下拉刷新</p>
          </div>
          <div class="summary-card maybe">
            <div class="num">${totalArch}</div>
            <div class="label">🔧 架构基础设施</div>
            <p>PWA Manifest, Service Worker, 安全区域适配, Skeleton 组件等 — 移动端必选能力</p>
          </div>
        </div>
      `;

      // Re-apply search filter if there's a search query
      const q = document.getElementById('searchInput').value.trim();
      if (q) applySearch(q);
    }

    function renderCard(f, catIdx, featIdx, catName) {
      const info = SCOPE_INFO[f.scope] || SCOPE_INFO.phase1;
      const hasSubs = f.subs && f.subs.length > 0;

      let subsHtml = '';
      if (hasSubs) {
        let subItemsHtml = '';
        f.subs.forEach(s => {
          const sInfo = SCOPE_INFO[s.scope] || SCOPE_INFO.phase1;
          subItemsHtml += `
            <div class="sub-item">
              <span class="sub-dot ${sInfo.dot}"></span>
              <span>${s.name}</span>
              <span style="font-size:10px;color:var(--c-text-muted);margin-left:auto">${scopeShort(s.scope)}</span>
            </div>
          `;
        });
        subsHtml = `
          <div class="sub-toggle" onclick="toggleSubs(this)">
            <i class="fa-regular fa-square-caret-down"></i> 展开 ${f.subs.length} 个子项
          </div>
          <div class="subs-area">${subItemsHtml}</div>
        `;
      }

      return `
        <div class="card ${info.css}"
             draggable="true"
             data-cat-idx="${catIdx}"
             data-feat-idx="${featIdx}"
             ondragstart="handleDragStart(event, ${catIdx}, ${featIdx})"
             ondragend="handleDragEnd(event)">
          <div class="cat-badge">${catName.replace(/^[^\s]+\s/, '').trim() || catName}</div>
          <div class="card-name">${f.name}</div>
          ${f.desc ? `<div class="card-desc">${f.desc}</div>` : ''}
          <div class="card-meta">
            ${hasSubs ? `<span class="sub-badge"><i class="fa-regular fa-rectangle-list"></i> ${f.subs.length} 子项</span>` : ''}
          </div>
          ${subsHtml}
        </div>
      `;
    }

    // ============================================================
    // INTERACTIONS
    // ============================================================
    window.toggleSubs = function(el) {
      const area = el.nextElementSibling;
      if (area && area.classList.contains('subs-area')) {
        area.classList.toggle('open');
        el.innerHTML = area.classList.contains('open')
          ? '<i class="fa-regular fa-square-caret-up"></i> 收起子项'
          : '<i class="fa-regular fa-square-caret-down"></i> 展开子项';
      }
    };

    // Search
    let searchTimer = null;

    window.onSearch = function(val) {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => applySearch(val.trim()), 150);
    };

    function applySearch(q) {
      const cards = document.querySelectorAll('.card');
      const columns = document.querySelectorAll('.column');
      let anyVisible = false;

      cards.forEach(card => {
        const name = card.querySelector('.card-name')?.textContent?.toLowerCase() || '';
        const desc = card.querySelector('.card-desc')?.textContent?.toLowerCase() || '';
        const cat = card.querySelector('.cat-badge')?.textContent?.toLowerCase() || '';
        const match = !q || name.includes(q) || desc.includes(q) || cat.includes(q);
        card.classList.toggle('hidden', !match);
        if (match) anyVisible = true;
      });

      // Hide empty columns
      columns.forEach(col => {
        const body = col.querySelector('.column-body');
        const visibleCards = body ? body.querySelectorAll('.card:not(.hidden)').length : 0;
        col.style.display = visibleCards === 0 ? 'none' : '';
      });
    }

    // Also handle the empty-state text in columns after search
    // (the column-empty div is static, so we hide it when cards exist)

    // ============================================================
    // INIT
    // ============================================================
    loadData();
    render();
  </script>
</body>
</html>
