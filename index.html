    connect-src 'self' https://unpkg.com;
    manifest-src 'self';
    worker-src 'self';
  "
    />

    <meta property="og:description" content="基于目标驱动的 AI 安全监管工作台 — 事找人、数据找人" />

    <meta name="supported-color-schemes" content="light dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="preconnect" href="https://unpkg.com" crossorigin />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/agent-init.css" />

  <body>
    <!-- ═══ 密码保护浮层 ═══════════════════════════════════════════ -->
    <div class="pwd-overlay" id="pwdOverlay">
      <div class="pwd-modal">
        <div class="pwd-icon"><i data-lucide="lock" width="32" height="32"></i></div>
        <div class="pwd-title">请输入访问密码</div>
        <div class="pwd-desc">请输入密码以继续</div>
        <div class="pwd-input-wrap">

            type="password"
            class="pwd-input"
            id="pwdInput"
            placeholder="输入密码"

        <div class="pwd-error" id="pwdError"></div>

      <!-- ─── 顶栏 ─────────────────────────────────────────────────── -->

              title="点击刷新"
            />

              <i data-lucide="menu" width="18" height="18"></i>
            </button>
            <div class="tab-strip" id="tabStrip"></div>
          </div>
          <!-- 移动端：头像 + 名称 + 组织 -->

            <div class="mobile-user-info">
              <div class="mobile-avatar" id="mobileAvatar" title="点击刷新">
                <i data-lucide="user" width="20" height="20"></i>
              </div>
              <div class="mobile-name-group">
                <span class="mobile-username" id="mobileUsername">杨站长</span>
                <span class="mobile-org" id="mobileOrg">良渚应急消防管理站</span>

        <div class="meta">

              <i data-lucide="search" width="18" height="18"></i>
            </div>
            <button class="topbar-plus-btn" id="desktopPlusBtn" data-cmd="toggleDemoMenu" title="菜单">
              <i data-lucide="plus" width="18" height="18"></i>
            </button>

          <!-- 移动端：搜索 + +号 -->

            <div class="topbar-search" data-cmd="openLauncher" title="搜索">

      <!-- ─── 主体：单列布局 ──────────────────────────────────────── -->

    <script src="js/lucide.min.js"></script>
    <script src="js/components/bottom-input-bar.js"></script>
    <script>
      // ═══ Lucide 性能优化: 默认限定图标渲染容器 ═══════════════════════
      (function () {
        if (typeof lucide === 'undefined' || !lucide.createIcons) return;
        var orig = lucide.createIcons;
        var _fullScanDone = false;
        lucide.createIcons = function (options) {
          if (!_fullScanDone) {
            _fullScanDone = true;
            orig.call(this);
            if (options) {
              if (options.nodeType === 1) return orig.call(this, options);
              if (options.container && options.container.nodeType === 1) return orig.call(this, options);
            }
            return;
          }
          if (options) {

      /* ═══ PWA Safe Area 修复（合并顶部 + 底部安全区）═══════════════ */
      /* 策略：优先信任 env()，仅在 iOS standalone 时用屏幕高度兜底 */
      (function () {
        var isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
        if (!isStandalone) return;

        // 添加 CSS class
        document.documentElement.classList.add('pwa-standalone');
        var isIOS = !!window.navigator.standalone;
        if (isIOS) document.documentElement.classList.add('pwa-ios');

        /* ─── 读取 env(safe-area-inset-top) ───────────────────────── */
        function readEnv(property) {
          var test = document.createElement('div');
          test.style.cssText = 'position:fixed;left:0;width:1px;height:1px;' + property + ':env(' + property + ')';
          document.body.appendChild(test);
          var v = parseInt(getComputedStyle(test)[property === 'padding-top' ? 'paddingTop' : 'paddingBottom'], 10);
          document.body.removeChild(test);
          return v;
        }

        function getSafeTop() {
          var v = readEnv('padding-top');
          if (v && v >= 10) return v;
          // iOS standalone 兜底：屏幕高度推算
          if (!isIOS) return 0;
          var h = window.screen.height;
          var ratio = window.devicePixelRatio || 1;
          if (h * ratio >= 2000 || h >= 896) return 59;
          if (h >= 844) return 54;
          if (h >= 812) return 44;
          return 20;
        }

        var sat = getSafeTop();
        var topTargets = [
          '.init-overlay',
          '.app .top',
          '.memory-panel',
          '.launcher-panel',
          '.action-modal-panel',
          '.si-modal',
        ];
        topTargets.forEach(function (sel) {
          var els = document.querySelectorAll(sel);
          for (var i = 0; i < els.length; i++) {
            els[i].style.setProperty('--pwa-safe-top', sat + 'px');
          }
        });
        document.documentElement.style.setProperty('--safe-top-real', sat + 'px');
        if (sat >= 44) document.documentElement.classList.add('has-notch');

        function getSafeBottom() {
          var v = readEnv('padding-bottom');
          if (v && v >= 10) return v;
          // iOS standalone 兜底
          if (!isIOS) return 0;
          var h = window.screen.height;
          if (h >= 812) return 34;
          return 0;
        }

        var sab = getSafeBottom();
        document.documentElement.style.setProperty('--pwa-safe-bottom', sab + 'px');

        /* ─── 统一 orientation change 处理 ──────────────────────── */
        window.addEventListener('orientationchange', function () {
          setTimeout(function () {
            var sat2 = getSafeTop();
            topTargets.forEach(function (sel) {
              var els = document.querySelectorAll(sel);
              for (var i = 0; i < els.length; i++) {
                els[i].style.setProperty('--pwa-safe-top', sat2 + 'px');
              }
            });
            document.documentElement.style.setProperty('--safe-top-real', sat2 + 'px');

            var sab2 = getSafeBottom();
            document.documentElement.style.setProperty('--pwa-safe-bottom', sab2 + 'px');
          }, 300);
        });
      })();

      /* ═══ VisualViewport 键盘适配（Android PWA + iOS） ═══════════ */
      /* 当键盘弹出时，fixed 定位元素在部分浏览器中可能被遮挡，
         通过 --keyboard-inset CSS 变量动态补偿底部间距 */
      (function () {
        if (!('visualViewport' in window)) return;
        var initialHeight = window.innerHeight;
        window.visualViewport.addEventListener('resize', function () {
          var diff = initialHeight - window.visualViewport.height;
          if (diff > 100) {
            document.documentElement.style.setProperty('--keyboard-inset', diff + 'px');
          } else {
            document.documentElement.style.removeProperty('--keyboard-inset');
          }
        });
      })();

      /* ═══ 移动端键盘弹出时输入框自动滚入可视区 ══════════════════ */

      /* ═══ 移动端：底部 Sheet 滑动手势关闭（swipe-to-dismiss）══════════ */
      /* Material Design 底部弹窗标准交互模式 */
      (function () {
        if (!('ontouchstart' in window)) return;
        var SHEET_SELECTORS = [
          '.action-modal-panel', '.pa-modal-panel', '.modal-panel',
          '.drill-float', '.conv-sheet', '.memory-panel'
        ];
        var threshold = 80; // 下滑 px 阈值触发关闭
        var startY = 0;
        var currentY = 0;
        var isDragging = false;
        var activeSheet = null;
        var initialTransform = 0;
        var maxDrag = 200; // 最大拖动距离

        function findSheet(el) {
          while (el) {
            if (el.classList && SHEET_SELECTORS.some(function (sel) {
              return el.matches && el.matches(sel);
            })) return el;
            el = el.parentElement;
          }
          return null;
        }

        function isSheetOpen(sheet) {
          // 判断底栏是否已打开
          return sheet.classList.contains('open') ||
                 (sheet.style.display && sheet.style.display !== 'none' &&
                  sheet.style.display !== '');
        }

        function getCloseTrigger(sheet) {
          // 找遮罩层或关闭按钮
          var overlay = sheet.closest('[class*="overlay"]');
          if (overlay) return overlay;
          return sheet;
        }

        function dragStart(e) {
          // 只处理顶部40px内的触摸（避免干扰内容滚动）
          var touch = e.touches[0];
          var sheet = findSheet(e.target);
          if (!sheet) return;
          // 在 sheet 顶部区域或拖拽手柄区域开始拖动
          var rect = sheet.getBoundingClientRect();
          var relY = touch.clientY - rect.top;
          var dragHandle = sheet.querySelector('::before') || sheet.firstElementChild;
          if (relY > 50) return; // 只允许从顶部50px区域开始拖
          if (!isSheetOpen(sheet)) return;

          startY = touch.clientY;
          currentY = startY;
          isDragging = true;
          activeSheet = sheet;
          initialTransform = 0;
          sheet.style.transition = 'none';
        }

        function dragMove(e) {
          if (!isDragging || !activeSheet) return;
          var touch = e.touches[0];
          currentY = touch.clientY;
          var delta = currentY - startY;
          if (delta < 0) delta = 0; // 不允许上拉
          delta = Math.min(delta, maxDrag);
          activeSheet.style.transform = 'translateY(' + delta + 'px)';
          // 同时调节遮罩透明度
          var overlay = activeSheet.closest('[class*="overlay"]');
          if (overlay) {
            overlay.style.transition = 'none';
            overlay.style.opacity = Math.max(0, 1 - delta / maxDrag);
          }
        }

        function dragEnd() {
          if (!isDragging || !activeSheet) return;
          var delta = currentY - startY;
          activeSheet.style.transition = '';
          var overlay = activeSheet.closest('[class*="overlay"]');
          if (overlay) overlay.style.transition = '';

          if (delta > threshold) {
            // 超过阈值 → 关闭
            activeSheet.style.transform = 'translateY(100%)';
            if (overlay) overlay.style.opacity = '0';
            setTimeout(function () {
              if (!activeSheet) return;
              activeSheet.style.transform = '';
              if (overlay) {
                overlay.style.opacity = '';
                // 触发关闭：隐藏 overlay
                var closeTrigger = getCloseTrigger(activeSheet);
                closeTrigger.classList.remove('open');
                if (closeTrigger.style.display) closeTrigger.style.display = 'none';
              }
              activeSheet = null;
            }, 200);
          } else {
            // 未超过阈值 → 弹回
            activeSheet.style.transform = '';
            if (overlay) overlay.style.opacity = '';
          }
          isDragging = false;
          activeSheet = null;
        }

        document.addEventListener('touchstart', dragStart, { passive: true });
        document.addEventListener('touchmove', dragMove, { passive: true });
        document.addEventListener('touchend', dragEnd, { passive: true });
        document.addEventListener('touchcancel', dragEnd, { passive: true });
      })();

      /* ═══ PWA 安装提示（Android Chrome）═══════════════════════════ */
      (function () {
        var deferredPrompt = null;
        var banner = document.getElementById('pwaInstallBanner');
        var installBtn = document.getElementById('pwaInstallBtn');
        var closeBtn = document.getElementById('pwaInstallClose');
        if (!banner) return;

        // 检查是否已安装或 30 天内忽略过
        function shouldShowBanner() {
          try {
            var val = localStorage.getItem('pwa-install-dismissed');
            if (!val) return true;
            if (val === 'installed') return false;
            var ts = parseInt(val, 10);
            if (isNaN(ts)) return true;
            return Date.now() - ts > 30 * 24 * 60 * 60 * 1000;
          } catch (e) {
            return true;
          }
        }

        window.addEventListener('beforeinstallprompt', function (e) {
          e.preventDefault();
          deferredPrompt = e;
          if (shouldShowBanner()) {
            banner.classList.add('visible');
            banner.setAttribute('aria-hidden', 'false');
          }
        });

        if (installBtn) {
          installBtn.addEventListener('click', function () {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(function () {
              deferredPrompt = null;
              banner.classList.remove('visible');
              banner.setAttribute('aria-hidden', 'true');
            });
          });
        }

        if (closeBtn) {
          closeBtn.addEventListener('click', function () {
            banner.classList.remove('visible');
            banner.setAttribute('aria-hidden', 'true');
            try {
              localStorage.setItem('pwa-install-dismissed', Date.now());
            } catch (e) {}
          });

          banner.classList.remove('visible');
          banner.setAttribute('aria-hidden', 'true');
          deferredPrompt = null;
          try {

      /* ═══ 断网检测指示器 ════════════════════════════════════════════ */

      /* ═══ SW 版本更新提示 ═══════════════════════════════════════════ */
      (function () {

      (function () {

        document.addEventListener(
          'touchstart',

            if (e.touches.length !== 1 || e.touches[0].clientX >= edgeWidth) return;
            var target = e.target;

                target.tagName === 'TEXTAREA' ||

      /* ═══ 点击 Logo / 头像强制刷新（清除 SW 缓存 + 重新加载） ═══════ */

            caches
              .keys()
              .then(function (keys) {

                  keys.map(function (k) {
                    return caches.delete(k);

                navigator.serviceWorker.ready.then(function (reg) {

        setInterval(checkUpdate, 30000);
        // 页面可见性变化时也检测（从后台切回前台）
        document.addEventListener('visibilitychange', function () {
          if (!document.hidden) checkUpdate();
        });
      })();
    </script>
  </body>
</html>
