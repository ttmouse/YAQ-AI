<!doctype html>
<!--
  站长每日监管闭环工作台 Demo
  使用对象：街道/镇级安全生产与消防安全分管站长
  核心：判断 → 定位 → 处置 → 跟踪闭环
-->
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>站长每日监管闭环工作台</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/agent-init.css">
</head>
<body>

  <!-- ═══ 主控 Agent 初始化场景 ═════════════════════════════════════ -->
  <div class="init-overlay" id="initOverlay">
    <div class="init-container">
      <div class="init-content" id="chatBox"></div>
    </div>
    <div class="init-quick-wrap" id="initQuickWrap"></div>
    <div class="init-chat-bar">
      <input type="text" class="init-chat-input" id="initChatInput" placeholder="直接对话，例如：帮我看好重大隐患"
        onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();window.convChatSend()}">
      <button class="init-chat-btn" onclick="window.convChatVoice()" title="语音输入">
        <i data-lucide="mic" width="16" height="16"></i>
      </button>
      <button class="init-chat-send" onclick="window.convChatSend()" title="发送">
        <i data-lucide="arrow-up" width="16" height="16"></i>
      </button>
    </div>
  </div>

  <!-- ═══ 杨站长工作台 v18 — 3 列布局 ════════════════════════════════ -->
  <div class="app">

    <!-- ─── 顶栏 ─────────────────────────────────────────────────── -->
    <div class="top">
      <div class="brand">
        <img src="https://app.17an.com/dsb/dsb-new/ea0dd430_2026-6-24/static/img/logo.16c3ec2.png" alt="logo" style="height:28px;width:auto">
        <div class="tab-strip" id="tabStrip"></div>
      </div>
      <div class="meta">
        <div class="topbar-search" onclick="openLauncher()" style="margin-left:0;margin-right:8px">
          <i data-lucide="search" width="14" height="14"></i>
          <span class="topbar-search-placeholder">搜索</span>
        </div>
        <span class="pill org-switch" onclick="showToast('组织切换（演示功能）')" title="切换组织">
          <i data-lucide="building-2" width="12" height="12" style="vertical-align:middle;margin-right:4px"></i> 良渚应急消防管理站
        </span>
        <span class="pill" id="topbarDate"></span>
        <span class="pill"><i data-lucide="user" width="12" height="12" style="vertical-align:middle;margin-right:4px"></i> 站长</span>
      </div>
    </div>

    <!-- ─── 主体：单列布局 ──────────────────────────────────────── -->
    <div class="main">

      <!-- ═══ 中栏：内容区 ════════════════════════════════════════ -->
      <div class="center">
        <div class="result" id="workspace">
          <div class="scene-content" id="sceneContent">
            <!-- 由 JS 动态渲染 -->
          </div>
        </div>
      </div>

    </div>
    <!-- ─── 演示菜单（左下角） ──────────────────────────── -->
    <div class="demo-menu-wrap" id="demoMenuWrap">
      <button class="demo-menu-trigger demo-corner" onclick="toggleDemoMenu()" title="演示菜单">
        <i data-lucide="more-vertical" width="18" height="18"></i>
      </button>
      <div class="demo-menu demo-corner-menu" id="demoMenu">
        <div class="demo-menu-item" onclick="window.resetInit();closeDemoMenu()"><i data-lucide="rotate-ccw" width="14" height="14"></i> 重新初始化</div>
        <div class="demo-menu-item" onclick="window.doDashboardRedirect();closeDemoMenu()"><i data-lucide="sparkles" width="14" height="14"></i> 初始化工作台</div>
        <div class="demo-menu-item" onclick="window.doNormalDashboard();closeDemoMenu()"><i data-lucide="layout-dashboard" width="14" height="14"></i> 日常工作台</div>
      </div>
    </div>
    <!-- ─── 全局底部浮动输入条 ────────────────────────────── -->
    <div class="global-chat-bar">
      <div class="global-chat-inner">
        <input type="text" id="globalChatInput" placeholder="直接问应擎总控，例如：帮我看一下物流片区为什么隐患闭环率下降"
          onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();window.globalChatSend()}">
        <button class="global-chat-mic" onclick="window.convChatVoice()" title="语音输入">
          <i data-lucide="mic" width="16" height="16"></i>
        </button>
        <button class="global-chat-btn" onclick="window.globalChatSend()" title="发送">
          <i data-lucide="arrow-up" width="16" height="16"></i>
        </button>
      </div>
    </div>
  </div>


  <!-- ─── Drawer Overlay ───────────────────────────────────────────── -->
  <div class="drawer-overlay" id="drawerOverlay"></div>

  <!-- ─── Drawer Panel ─────────────────────────────────────────────── -->
  <div class="drawer-panel" id="drawerPanel">
    <div class="drawer-header">
      <h3 id="drawerTitle"></h3>
      <button class="drawer-close" id="drawerClose" aria-label="关闭">
        <i data-lucide="x" aria-hidden="true"></i>
      </button>
    </div>
    <div class="drawer-body" id="drawerBody">
      <!-- Dynamic content -->
    </div>
    <div class="drawer-footer">
      <button class="drawer-btn primary" id="drawerConfirm">确认生成</button>
      <button class="drawer-btn" id="drawerCancel">取消</button>
    </div>
  </div>

  <!-- ─── 指标配置弹窗 ─────────────────────────────────────────── -->
  <div class="modal-overlay" id="metricModalOverlay" onclick="closeMetricConfig()"></div>
  <div class="modal-panel" id="metricModal">
    <div class="modal-head">
      <div class="modal-head-top">
        <span style="font-weight:600;font-size:15px">配置显示指标</span>
        <div style="position:relative;flex:1;max-width:320px;margin:0 24px">
          <i data-lucide="search" width="14" height="14" style="position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--weak);pointer-events:none"></i>
          <input id="metricSearchInput" placeholder="搜索指标名称" oninput="onMetricSearch()" style="padding-left:28px;width:100%;height:30px;border:1px solid var(--line);border-radius:999px;background:#f2f4f7;font-size:12px;color:var(--text);outline:none;font-family:inherit;transition:border-color .15s;padding-right:10px">
        </div>
        <button class="modal-close" onclick="closeMetricConfig()"><i data-lucide="x" width="16" height="16"></i></button>
      </div>
      <div class="modal-filters" id="metricFilterTabs"></div>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;padding:0;overflow:hidden">
      <div class="mbody-top" id="metricCheckboxes" style="flex:1;overflow-y:auto;padding:14px 18px">
        <!-- 指标网格由 JS 渲染 -->
      </div>
      <div class="mbody-bottom" id="selectedArea" style="flex-shrink:0;border-top:1px solid var(--line);padding:10px 18px 8px;max-height:170px;overflow-y:auto">
        <div style="font-size:11px;font-weight:600;color:var(--weak);margin-bottom:6px">已选指标（拖拽排序）</div>
        <div id="selectedMetricsList" style="display:flex;flex-wrap:nowrap;gap:4px;overflow-x:auto;overflow-y:hidden;padding:6px 0 2px"></div>
      </div>
    </div>
    <div class="modal-foot">
      <div class="mfoot-count" id="mfootCount">已选 <strong>0</strong> 个指标</div>
      <div class="mfoot-actions">
        <button class="mfoot-btn" onclick="closeMetricConfig()">取消</button>
        <button class="mfoot-btn primary" onclick="saveMetricConfig()">保存</button>
      </div>
    </div>
  </div>

  <!-- ─── 隐患详情弹窗 ─────────────────────────────────────────── -->
  <div class="modal-overlay" id="hazardModalOverlay" onclick="closeHazardModal()"></div>
  <div class="hmodal-panel" id="hazardModal">
    <div class="hmodal-head">
      <div class="hmodal-title">
        <span class="hmodal-dot" id="hazardModalDot" style="background:var(--red)"></span>
        <span id="hazardModalName">隐患详情</span>
      </div>
      <button class="hmodal-close" onclick="closeHazardModal()">✕</button>
    </div>
    <div class="hmodal-body" id="hazardModalBody"></div>
    <div class="hmodal-foot">
      <div class="hmfoot-actions">
        <button class="hmfoot-action primary" title="督办" onclick="openDrawer('supervise')"><i data-lucide="megaphone" width="14" height="14"></i><span>督办</span></button>
        <button class="hmfoot-action" title="现场核查" onclick="openDrawer('inspect')"><i data-lucide="search" width="14" height="14"></i><span>现场核查</span></button>
        <button class="hmfoot-action" title="会议议题" onclick="openDrawer('meeting')"><i data-lucide="calendar" width="14" height="14"></i><span>会议议题</span></button>
        <button class="hmfoot-action" title="持续跟踪" onclick="showToast('已加入持续跟踪')"><i data-lucide="pin" width="14" height="14"></i><span>跟踪</span></button>
      </div>
      <button class="hmfoot-copy" onclick="copyHazardInfo()"><i data-lucide="copy" width="14" height="14"></i> 复制隐患信息</button>
    </div>
  </div>

  <!-- ─── 任务详情弹窗 ─────────────────────────────────────────── -->
  <div class="modal-overlay" id="taskModalOverlay" onclick="closeTaskModal()"></div>
  <div class="tmodal-panel" id="taskModal">
    <div class="tmodal-head">
      <div class="tmodal-title" id="taskModalTitle">
        <i data-lucide="target" width="16" height="16" style="color:var(--accent)"></i>
        <span id="taskModalName">任务详情</span>
      </div>
      <button class="tmodal-close" onclick="closeTaskModal()">✕</button>
    </div>
    <div class="tmodal-body" id="taskModalBody">
      <div class="tmodal-left" id="taskModalLeft"></div>
      <div class="tmodal-divider"></div>
      <div class="tmodal-right" id="taskModalRight"></div>
    </div>
  </div>

  <!-- ─── Toast ────────────────────────────────────────────────────── -->
  <div class="toast" id="toast"></div>

  <!-- ─── 指标说明浮层 ─────────────────────────────────────────── -->
  <div class="metric-tip" id="metricTip"></div>

  <!-- ─── 指标钻取浮层 ──────────────────────────────────────────── -->
  <div class="modal-overlay" id="drillOverlay" onclick="closeDrillFloat()"></div>
  <div class="drill-float" id="drillFloat">
    <div class="drill-head">
      <h3 class="drill-title" id="drillTitle"></h3>
      <button class="drill-close" onclick="closeDrillFloat()"><i data-lucide="x" width="16" height="16"></i></button>
    </div>
    <div class="drill-body" id="drillBody">
      <!-- left: item list / right: AI analysis -->
    </div>
  </div>

  <!-- ─── 站点地图启动台 ─────────────────────────────────────────── -->
  <div class="launcher-overlay" id="launcherOverlay" onclick="closeLauncher()"></div>
  <div class="launcher-panel" id="launcherPanel">
    <div class="launcher-header">
      <div class="launcher-search-wrap">
        <i data-lucide="search" width="18" height="18" class="launcher-search-icon"></i>
        <input class="launcher-search" id="launcherSearch" type="text"
          placeholder="搜索功能名称…"
          autocomplete="off"
          oninput="onLauncherSearch()"
          onkeydown="if(event.key==='Enter')launcherSearchFirst();if(event.key==='Escape')closeLauncher()">
      </div>
    </div>
    <div class="launcher-body" id="launcherBody">
      <!-- 由 JS 渲染 -->
    </div>
  </div>

  <!-- ═══ 企业详情面板（右侧滑出）═════════════════════════════════ -->
  <div class="ep-panel" id="epPanel">
    <div class="ep-head">
      <div class="ep-head-left">
        <i data-lucide="building-2" width="18" height="18"></i>
        <span id="epName" style="font-weight:700;font-size:16px">企业名称</span>
      </div>
      <button class="ep-close" onclick="closeEnterprisePanel()" aria-label="关闭">
        <i data-lucide="x" width="18" height="18"></i>
      </button>
    </div>
    <div class="ep-body" id="epBody">
      <!-- Risk level + summary + metric row (fixed) -->
      <div id="epFixedTop"></div>
      <!-- Tab content (switches) -->
      <div id="epTabContent"></div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/rules.js"></script>
  <script src="js/agent-init.js"></script>

</body>
</html>
