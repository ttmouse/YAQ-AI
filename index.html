<!doctype html>
<!--
  站长每日监管闭环工作台 Demo
  使用对象：街道/镇级安全生产与消防安全分管站长
  核心：判断 → 定位 → 处置 → 跟踪闭环
-->
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      http-equiv="Content-Security-Policy"
      content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://unpkg.com;
    style-src 'self' 'unsafe-inline';
    img-src 'self' https://app.17an.com data:;
    font-src 'self' data:;
    connect-src 'self' https://unpkg.com;
    manifest-src 'self';
    worker-src 'self';
  "
    />
    <meta property="og:title" content="站长每日监管闭环工作台" />
    <meta property="og:description" content="基于目标驱动的 AI 安全监管工作台 — 事找人、数据找人" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ttmouse.com/yaq-ai/" />
    <meta property="og:image" content="https://ttmouse.com/yaq-ai/favicon.svg" />
    <meta name="description" content="基于目标驱动的 AI 安全监管工作台 — 事找人、数据找人" />
    <title>站长每日监管闭环工作台</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <!-- ═══ PWA — iOS 添加到主屏幕 + Android TWA ══════════════════ -->
    <link rel="manifest" href="manifest.json" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="小安工作台" />
    <meta name="theme-color" content="#6366f1" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)" />

    <meta name="color-scheme" content="light dark" />
    <!-- iOS 所有尺寸图标 -->
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <!-- iOS 启动屏（splash/ 目录有9种设备尺寸的启动图片） -->
    <link
      rel="apple-touch-startup-image"
      href="splash/splash-640x1136.png"
      media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)"
    />
    <link
      rel="apple-touch-startup-image"
      href="splash/splash-750x1334.png"
      media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)"
    />
    <link
      rel="apple-touch-startup-image"
      href="splash/splash-828x1792.png"
      media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)"
    />
    <link
      rel="apple-touch-startup-image"
      href="splash/splash-1125x2436.png"
      media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)"
    />
    <link
      rel="apple-touch-startup-image"
      href="splash/splash-1170x2532.png"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
    />
    <link
      rel="apple-touch-startup-image"
      href="splash/splash-1242x2208.png"
      media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)"
    />
    <link
      rel="apple-touch-startup-image"
      href="splash/splash-1242x2688.png"
      media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)"
    />
    <link
      rel="apple-touch-startup-image"
      href="splash/splash-1284x2778.png"
      media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)"
    />
    <link
      rel="apple-touch-startup-image"
      href="splash/splash-1290x2796.png"
      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- 禁止自动识别电话/地址（管理后台不需要） -->
    <meta name="format-detection" content="telephone=no,address=no,email=no" />

    <link rel="preconnect" href="https://unpkg.com" crossorigin />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/agent-init.css" />
    <!-- ═══ 新设计系统 — JS 渲染引擎依赖的 CSS 模块 ══════════════════ -->
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/blocks.css" />
    <link rel="stylesheet" href="css/detail.css" />
    <link rel="stylesheet" href="css/modal.css" />
    <link rel="stylesheet" href="css/work-items.css" />
    <link rel="stylesheet" href="css/assistant.css" />
    <link rel="stylesheet" href="css/mobile.css" />
    <link rel="stylesheet" href="css/mobile-additions.css" />
    <link rel="stylesheet" href="css/utilities.css" />
    <link rel="stylesheet" href="css/inspection.css" />
    <link rel="stylesheet" href="css/skill-engine.css" />
    <!-- ═══ 关键路径内联样式 — 防止加载过程中的背景闪白 ═══════ -->
    <style>
      html {
        background: #f8f9fc;
      }
      @media (prefers-color-scheme: dark) {
        html {
          background: #23232e;
        }
      }
    </style>
  </head>
  <body>
    <!-- ═══ 密码保护浮层 ═══════════════════════════════════════════ -->
    <div class="pwd-overlay" id="pwdOverlay">
      <div class="pwd-modal">
        <div class="pwd-icon"><i data-lucide="lock" width="32" height="32"></i></div>
        <div class="pwd-title">请输入访问密码</div>
        <div class="pwd-desc">请输入密码以继续</div>
        <div class="pwd-input-wrap">
          <input
            type="password"
            class="pwd-input"
            id="pwdInput"
            placeholder="输入密码"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            inputmode="text"
            onkeydown="if (event.key === 'Enter') window.YAQ.pwdSubmit();"
          />
        </div>
        <div class="pwd-error" id="pwdError"></div>
        <button class="pwd-btn" id="pwdBtn" onclick="window.YAQ.pwdSubmit()">确认</button>
      </div>
    </div>

    <!-- ═══ 杨站长工作台 v18 — 3 列布局 ════════════════════════════════ -->
    <div class="app">
      <!-- ─── 顶栏 ─────────────────────────────────────────────────── -->
      <div class="top">
        <div class="brand">
          <!-- 桌面端：Logo + 汉堡 + Tab -->
          <div class="brand-desktop">
            <img
              src="https://app.17an.com/dsb/dsb-new/ea0dd430_2026-6-24/static/img/logo.16c3ec2.png"
              alt="logo"
              style="height: 22px; width: auto; cursor: pointer"
              class="brand-logo"
              id="brandLogo"
              title="点击刷新"
              loading="lazy"
            />
            <button class="hamburger-btn" id="hamburgerBtn" aria-label="菜单" title="切换场景">
              <i data-lucide="menu" width="18" height="18"></i>
            </button>
            <div class="tab-strip" id="tabStrip"></div>
          </div>
          <!-- 移动端：头像 + 名称 + 组织 -->
          <div class="brand-mobile">
            <div class="mobile-user-info">
              <div class="mobile-avatar" id="mobileAvatar" title="点击刷新">
                <i data-lucide="user" width="20" height="20"></i>
              </div>
              <div class="mobile-name-group">
                <span class="mobile-username" id="mobileUsername">杨站长</span>
                <span class="mobile-org" id="mobileOrg">良渚应急消防管理站</span>
              </div>
            </div>
          </div>
        </div>
        <div class="meta">
          <!-- 桌面端：通知 + 搜索 + 加号菜单 -->
          <div class="meta-desktop">
            <span class="notif-bell" id="notifBell" title="通知">
              <i data-lucide="bell" width="16" height="16"></i>
              <span class="notif-badge" id="notifBadge">3</span>
            </span>
            <div class="topbar-search" data-cmd="openLauncher" title="搜索">
              <i data-lucide="search" width="18" height="18"></i>
            </div>
            <button class="topbar-plus-btn" id="desktopPlusBtn" data-cmd="toggleDemoMenu" title="菜单">
              <i data-lucide="plus" width="18" height="18"></i>
            </button>
          </div>
          <!-- 移动端：搜索 + +号 -->
          <div class="meta-mobile">
            <div class="topbar-search" data-cmd="openLauncher" title="搜索">
              <i data-lucide="search" width="20" height="20"></i>
            </div>
            <button class="mobile-plus-btn" id="mobilePlusBtn" data-haptic="light" title="更多">
              <i data-lucide="plus" width="22" height="22"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- ─── 主体：单列布局 ──────────────────────────────────────── -->
      <div class="main" id="mainLayout">
        <!-- ═══ 右侧浮动：月报历史侧边栏（覆盖层，不占宽） ═════ -->
        <div
          id="mrSidebar"
          style="
            display: none;
            position: absolute;
            top: 52px;
            right: 0;
            bottom: 0;
            width: 220px;
            background: var(--card);
            border-left: 1px solid var(--line);
            box-shadow: -4px 0 20px rgba(0, 0, 0, 0.06);
            z-index: 100;
            overflow-y: auto;
            padding: 0;
          "
        >
          <div id="mrSidebarContent"></div>
        </div>

        <!-- ═══ 中栏：内容区 ════════════════════════════════════════ -->
        <div class="center">
          <div class="result" id="workspace">
            <div class="scene-content" id="sceneContent" aria-live="polite" aria-atomic="false">
              <!-- 由 JS 动态渲染 -->
            </div>
          </div>
        </div>
      </div>
      <!-- ─── 演示菜单（右上角） ──────────────────────────── -->
      <div class="demo-menu-wrap" id="demoMenuWrap">
        <div class="demo-menu demo-corner-menu" id="demoMenu">
          <div class="demo-menu-label">Demo</div>
          <div class="demo-menu-item" data-cmd="switchScene" data-arg="special-inspection" title="智能专项检查">
            <i data-lucide="file-search" width="18" height="18"></i>
            <span>智能专项检查</span>
          </div>
          <div class="demo-menu-item" data-cmd="resetAndCloseMenu" title="重新初始化">
            <i data-lucide="rotate-ccw" width="18" height="18"></i>
            <span>重新初始化</span>
          </div>
          <div class="demo-menu-item" data-cmd="dashboardRedirectAndClose" title="初始化工作台">
            <i data-lucide="sparkles" width="18" height="18"></i>
            <span>初始化工作台</span>
          </div>
          <div class="demo-menu-item" data-cmd="normalDashboardAndClose" title="日常工作台">
            <i data-lucide="layout-dashboard" width="18" height="18"></i>
            <span>日常工作台</span>
          </div>
          <div class="demo-menu-item" data-cmd="closeMenuAndOpenComparison" title="AI vs 传统流程对比">
            <i data-lucide="git-compare" width="18" height="18"></i>
            <span>AI vs 传统流程对比</span>
          </div>
          <div class="demo-menu-divider"></div>
          <div class="demo-menu-item" data-cmd="openMemoryPanel" title="记忆">
            <i data-lucide="brain" width="18" height="18"></i>
            <span>记忆</span>
          </div>
          <div class="demo-menu-item" data-cmd="openUploadedFiles" title="上传的文件">
            <i data-lucide="folder-open" width="18" height="18"></i>
            <span>上传的文件</span>
          </div>
          <div class="demo-menu-item" data-cmd="openGeneratedReports" title="生成的报告">
            <i data-lucide="file-text" width="18" height="18"></i>
            <span>生成的报告</span>
          </div>
        </div>
      </div>
      <!-- ─── 记忆面板 ────────────────────────────────── -->
      <div class="memory-panel-overlay" id="memoryPanelOverlay" onclick="YAQ.closeMemoryPanel()"></div>
      <div class="memory-panel" id="memoryPanel" role="dialog" aria-modal="true" aria-label="记忆" tabindex="-1">
        <div class="memory-panel-head">
          <div class="memory-panel-title">
            <i data-lucide="brain" width="18" height="18" style="color: #6366f1"></i> 记忆
          </div>
          <button class="memory-panel-close" onclick="YAQ.closeMemoryPanel()" aria-label="关闭记忆面板">
            <i data-lucide="x" width="16" height="16"></i>
          </button>
        </div>
        <div class="memory-panel-body" id="memoryPanelBody">
          <!-- 由 JS 动态渲染 -->
        </div>
      </div>
      <!-- global-chat-bar 全局底部输入条（固定在底部，各场景复用） -->
      <div class="global-chat-bar">
        <div class="global-chat-inner">
          <button class="global-chat-btn-icon" id="globalChatAttach" data-cmd="convChatAttach" title="上传文件">
            <i data-lucide="plus" width="16" height="16"></i>
          </button>
          <textarea
            id="globalChatInput"
            placeholder="发消息或按住说话"
            inputmode="text"
            autocomplete="off"
            autocorrect="on"
            autocapitalize="sentences"
            data-cmd-key="Enter"
            data-cmd="globalChatSend"
            rows="1"
          ></textarea>
          <div class="global-chat-actions">
            <button class="global-chat-btn-icon" data-cmd="convChatVoice" data-haptic="light" title="语音输入">
              <i data-lucide="mic" width="16" height="16"></i>
            </button>
            <button class="global-chat-btn" data-cmd="globalChatSend" data-haptic="medium" title="发送">
              <i data-lucide="arrow-up" width="16" height="16"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- ═══ 移动端底部导航栏（PWA 独立模式）═══════════════════════ -->
      <!-- 设计原则：减法优先 — 底部 tab ≤ 5 个；接近性 — 图标+标签；
           包容性 — ≥44px 触控目标 -->
      <nav class="mb-bottom-nav" id="mbBottomNav" role="tablist" aria-label="主要导航" style="display: none !important">
        <button class="mb-nav-item active" data-scene="dashboard" role="tab" aria-selected="true" data-haptic="light">
          <i data-lucide="layout-dashboard" width="20" height="20"></i>
          <span>工作台</span>
        </button>
        <button class="mb-nav-item" data-scene="hazard-report" role="tab" aria-selected="false" data-haptic="light">
          <i data-lucide="alert-triangle" width="20" height="20"></i>
          <span>隐患整改</span>
        </button>
        <button class="mb-nav-item" data-scene="followup" role="tab" aria-selected="false" data-haptic="light">
          <i data-lucide="activity" width="20" height="20"></i>
          <span>持续跟踪</span>
        </button>
        <button class="mb-nav-item" data-scene="pending-actions" role="tab" aria-selected="false" data-haptic="light">
          <i data-lucide="clipboard-list" width="20" height="20"></i>
          <span>待确认</span>
        </button>
        <button class="mb-nav-item" data-cmd="openLauncher" role="tab" aria-selected="false" data-haptic="light">
          <i data-lucide="grid-3x3" width="20" height="20"></i>
          <span>更多</span>
        </button>
      </nav>
    </div>

    <!-- ─── Drawer Overlay ───────────────────────────────────────────── -->
    <div class="drawer-overlay" id="drawerOverlay"></div>

    <!-- ─── Drawer Panel ─────────────────────────────────────────────── -->
    <div class="drawer-panel" id="drawerPanel" role="dialog" aria-modal="true" aria-label="操作面板" tabindex="-1">
      <div class="drawer-header">
        <h3 id="drawerTitle"></h3>
        <button class="drawer-close" id="drawerClose" aria-label="关闭">
          <i data-lucide="x" aria-hidden="true"></i>
        </button>
      </div>
      <div class="drawer-body" id="drawerBody">
        <!-- Dynamic content -->
      </div>
      <div class="drawer-footer">
        <button class="drawer-btn primary" id="drawerConfirm">确认生成</button>
        <button class="drawer-btn" id="drawerCancel">取消</button>
      </div>
    </div>

    <!-- ─── 居中大浮层：行动项确认弹窗 ────────────────────────── -->
    <div class="action-modal-overlay" id="actionModalOverlay" onclick="closeActionModal()" tabindex="-1"></div>
    <div
      class="action-modal-panel"
      id="actionModal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="actionModalTitle"
      tabindex="-1"
    >
      <div class="action-modal-header">
        <h3 id="actionModalTitle"></h3>
        <button class="action-modal-close" onclick="closeActionModal()" aria-label="关闭">
          <i data-lucide="x" aria-hidden="true"></i>
        </button>
      </div>
      <div class="action-modal-body" id="actionModalBody">
        <!-- Dynamic content -->
      </div>
      <div class="action-modal-footer" id="actionModalFooter" style="display: none"></div>
    </div>

    <!-- ─── 指标配置弹窗 ─────────────────────────────────────────── -->
    <div class="modal-overlay" id="metricModalOverlay" data-cmd="closeMetricConfig" tabindex="-1"></div>
    <div class="modal-panel" id="metricModal" role="dialog" aria-modal="true" aria-label="配置显示指标" tabindex="-1">
      <div class="modal-head">
        <button class="modal-close" data-cmd="closeMetricConfig">
          <i data-lucide="x" width="16" height="16"></i>
        </button>
        <div class="modal-head-top">
          <span class="modal-title">配置显示指标</span>
          <div class="modal-search-wrap">
            <i data-lucide="search" width="13" height="13" class="modal-search-icon"></i>
            <input
              id="metricSearchInput"
              class="modal-search-input"
              type="search"
              placeholder="搜索指标名称"
              autocomplete="off"
              autocorrect="off"
              autocapitalize="off"
              inputmode="search"
              data-cmd-input="onMetricSearch"
            />
          </div>
        </div>
        <div class="modal-filter-bar" id="metricFilterTabs"></div>
      </div>
      <div class="modal-body" style="display: flex; flex-direction: column; padding: 0; overflow: hidden">
        <div class="mbody-top" id="metricCheckboxes" style="flex: 1; overflow-y: auto; padding: 14px 18px">
          <!-- 指标网格由 JS 渲染 -->
        </div>
        <div
          class="mbody-bottom"
          id="selectedArea"
          style="
            flex-shrink: 0;
            border-top: 1px solid var(--line);
            padding: 10px 18px 8px;
            max-height: 170px;
            overflow-y: auto;
          "
        >
          <div style="font-size: 11px; font-weight: 600; color: var(--weak); margin-bottom: 6px">
            已选指标（拖拽排序）
          </div>
          <div
            id="selectedMetricsList"
            style="display: flex; flex-wrap: nowrap; gap: 4px; overflow-x: auto; overflow-y: hidden; padding: 6px 0 2px"
          ></div>
        </div>
      </div>
      <div class="modal-foot">
        <div class="mfoot-count" id="mfootCount">已选 <strong>0</strong> 个指标</div>
        <div class="mfoot-actions">
          <button class="mfoot-btn" data-cmd="closeMetricConfig">取消</button>
          <button class="mfoot-btn primary" data-cmd="saveMetricConfig">保存</button>
        </div>
      </div>
    </div>

    <!-- ─── 隐患详情弹窗 ─────────────────────────────────────────── -->
    <div class="modal-overlay" id="hazardModalOverlay" data-cmd="closeHazardModal" tabindex="-1"></div>
    <div class="hmodal-panel" id="hazardModal" role="dialog" aria-modal="true" aria-label="隐患详情" tabindex="-1">
      <div class="hmodal-head">
        <div class="hmodal-title">
          <span class="hmodal-dot" id="hazardModalDot" style="background: var(--red)"></span>
          <span id="hazardModalName">隐患详情</span>
        </div>
        <button class="hmodal-close" data-cmd="closeHazardModal" aria-label="关闭">
          <i data-lucide="x" width="16" height="16"></i>
        </button>
      </div>
      <div class="hmodal-body" id="hazardModalBody"></div>
      <div class="hmodal-foot">
        <div class="hmfoot-actions">
          <button
            class="hmfoot-action primary"
            title="督办"
            aria-label="督办"
            data-cmd="openDrawer"
            data-arg="supervise"
          >
            <i data-lucide="megaphone" width="14" height="14"></i><span>督办</span>
          </button>
          <button class="hmfoot-action" title="现场核查" aria-label="现场核查" data-cmd="openDrawer" data-arg="inspect">
            <i data-lucide="search" width="14" height="14"></i><span>现场核查</span>
          </button>
          <button class="hmfoot-action" title="会议议题" aria-label="会议议题" data-cmd="openDrawer" data-arg="meeting">
            <i data-lucide="calendar" width="14" height="14"></i><span>会议议题</span>
          </button>
          <button
            class="hmfoot-action"
            title="持续跟踪"
            aria-label="持续跟踪"
            data-cmd="showToast"
            data-arg="已加入持续跟踪"
          >
            <i data-lucide="pin" width="14" height="14"></i><span>跟踪</span>
          </button>
        </div>
        <button class="hmfoot-copy" data-cmd="copyHazardInfo" data-share="hazard">
          <i data-lucide="copy" width="14" height="14"></i> 复制隐患信息
        </button>
      </div>
    </div>

    <!-- ─── 任务详情弹窗 ─────────────────────────────────────────── -->
    <div class="modal-overlay" id="taskModalOverlay" data-cmd="closeTaskModal" tabindex="-1"></div>

      (function () {

        var orig = lucide.createIcons;
        var _fullScanDone = false;
        lucide.createIcons = function (options) {
          if (!_fullScanDone) {
            _fullScanDone = true;
            orig.call(this);
            if (options) {
              if (options.nodeType === 1) return orig.call(this, options);
              if (options.container && options.container.nodeType === 1) return orig.call(this, options);
            }
            return;
          }
          if (options) {
            if (options.nodeType === 1) return orig.call(this, options);
            if (options.container && options.container.nodeType === 1) return orig.call(this, options);
          }
          var container =
            document.querySelector('.workspace') ||
            document.querySelector('.scene-content') ||
            document.getElementById('sceneContent');
          if (container) return orig.call(this, { container: container });
          return orig.call(this);
        };
      })();

    <!-- ═══ PWA Service Worker 注册 ════════════════════════════════ -->
    <script>

      /* ═══ 移动端：加号按钮 → 展开演示菜单 ══════════════════════ */
      (function () {
        var plusBtn = document.getElementById('mobilePlusBtn');

        if (!plusBtn || !menuWrap) return;

        plusBtn.addEventListener('click', function (e) {
          if (window.innerWidth > 768) return; // 桌面端不处理
          e.preventDefault();

            var menu = document.getElementById('demoMenu');
            if (menu) menu.classList.remove('open');

        /* ═══ 通知红点：点击铃铛弹 toast，红点永远不消失 ══════════ */

            }
          });

      })();

      /* ═══ PWA Safe Area 修复（合并顶部 + 底部安全区）═══════════════ */
      /* 策略：优先信任 env()，仅在 iOS standalone 时用屏幕高度兜底 */
      (function () {
        var isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
        if (!isStandalone) return;

        // 添加 CSS class
        document.documentElement.classList.add('pwa-standalone');
        var isIOS = !!window.navigator.standalone;
        if (isIOS) document.documentElement.classList.add('pwa-ios');

        /* ─── 读取 env(safe-area-inset-top) ───────────────────────── */
        function readEnv(property) {
          var test = document.createElement('div');
          test.style.cssText = 'position:fixed;left:0;width:1px;height:1px;' + property + ':env(' + property + ')';
          document.body.appendChild(test);
          var v = parseInt(getComputedStyle(test)[property === 'padding-top' ? 'paddingTop' : 'paddingBottom'], 10);
          document.body.removeChild(test);
          return v;
        }

        function getSafeTop() {
          var v = readEnv('padding-top');
          if (v && v >= 10) return v;
          // iOS standalone 兜底：屏幕高度推算
          if (!isIOS) return 0;
          var h = window.screen.height;
          var ratio = window.devicePixelRatio || 1;
          if (h * ratio >= 2000 || h >= 896) return 59;
          if (h >= 844) return 54;
          if (h >= 812) return 44;
          return 20;
        }

        var sat = getSafeTop();
        var topTargets = [
          '.init-overlay',
          '.app .top',
          '.memory-panel',
          '.launcher-panel',
          '.action-modal-panel',
          '.si-modal',
        ];
        topTargets.forEach(function (sel) {
          var els = document.querySelectorAll(sel);
          for (var i = 0; i < els.length; i++) {
            els[i].style.setProperty('--pwa-safe-top', sat + 'px');
          }
        });
        document.documentElement.style.setProperty('--safe-top-real', sat + 'px');
        if (sat >= 44) document.documentElement.classList.add('has-notch');

        function getSafeBottom() {
          var v = readEnv('padding-bottom');
          if (v && v >= 10) return v;
          // iOS standalone 兜底
          if (!isIOS) return 0;
          var h = window.screen.height;
          if (h >= 812) return 34;
          return 0;
        }

        var sab = getSafeBottom();
        document.documentElement.style.setProperty('--pwa-safe-bottom', sab + 'px');

        /* ─── 统一 orientation change 处理 ──────────────────────── */
        window.addEventListener('orientationchange', function () {
          setTimeout(function () {
            var sat2 = getSafeTop();
            topTargets.forEach(function (sel) {
              var els = document.querySelectorAll(sel);
              for (var i = 0; i < els.length; i++) {
                els[i].style.setProperty('--pwa-safe-top', sat2 + 'px');
              }
            });
            document.documentElement.style.setProperty('--safe-top-real', sat2 + 'px');

            var sab2 = getSafeBottom();
            document.documentElement.style.setProperty('--pwa-safe-bottom', sab2 + 'px');
          }, 300);
        });
      })();

      /* ═══ VisualViewport 键盘适配（Android + iOS PWA） ═══ */
      /* 修复：使用 visualViewport.height 而非 window.innerHeight 作为基准值，
        避免 Safari 工具栏展开/收起导致的误触发。PWA standalone 模式下增加
        orientation change 重新校准。 */
      (function () {
        if (!('visualViewport' in window)) return;
        var isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
        var isIOS = !!window.navigator.standalone || /iPad|iPhone|iPod/.test(navigator.userAgent);
        var initialHeight = 0;
        var lastDiff = 0;
        var rafPending = false;

        function calibrateBaseline() {
          // standalone 模式用 screen.height 规避工具栏变化干扰
          if (isStandalone && window.screen && window.screen.height) {
            initialHeight = Math.max(window.screen.height, window.visualViewport.height);
          } else {
            initialHeight = window.visualViewport.height;
          }
        }
        calibrateBaseline();

        function updateKeyboardInset(diff) {
          if (diff > 80) {
            document.documentElement.style.setProperty('--keyboard-inset', diff + 'px');
            var chatBar = document.querySelector('.global-chat-bar, .init-chat-bar');
            if (chatBar) {
              chatBar.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            lastDiff = diff;
          } else {
            document.documentElement.style.removeProperty('--keyboard-inset');
            lastDiff = 0;
          }
        }

        window.visualViewport.addEventListener('resize', function () {
          if (rafPending) return;
          rafPending = true;
          requestAnimationFrame(function () {
            rafPending = false;
            var viewportHeight = window.visualViewport.height;
            var diff = initialHeight - viewportHeight;
            updateKeyboardInset(diff);
          });
        });

        // orientation change 重新校准（standalone 模式 screen.height 不变，但旋转后 safe-area 变化）
        window.addEventListener('orientationchange', function () {
          setTimeout(calibrateBaseline, 500);
        });

        // 输入框聚焦时也确保可见
        document.addEventListener('focusin', function (e) {
          if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') return;
          if (lastDiff > 80) {
            var chatBar = e.target.closest('.global-chat-bar, .init-chat-bar');
            if (chatBar) {
              setTimeout(function () {
                chatBar.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
              }, 200);
            }
          }
        });

        // iOS 特殊处理：监听键盘弹起/收起事件
        if (isIOS) {
          document.addEventListener('focusin', function (e) {
            if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') return;
            setTimeout(function () {
              var viewportHeight = window.visualViewport.height;
              var diff = initialHeight - viewportHeight;
              if (diff > 80) {
                document.documentElement.style.setProperty('--keyboard-inset', diff + 'px');
              }
            }, 350);
          });
          document.addEventListener('focusout', function () {
            setTimeout(function () {
              document.documentElement.style.removeProperty('--keyboard-inset');
            }, 100);
          });
        }
      })();

      /* ═══ 移动端键盘弹出时输入框自动滚入可视区 ═════════════════ */
      /* iOS PWA standalone 使用键盘覆盖模式，需额外偏移避免被键盘遮挡 */
      (function () {
        if (!('ontouchstart' in window)) return;
        document.addEventListener('focusin', function (e) {
          var el = e.target;
          if (el.tagName !== 'INPUT' && el.tagName !== 'TEXTAREA') return;
          // 底部固定输入条的输入框不需要滚动（键盘覆盖模式已处理）
          if (el.closest('.global-chat-bar, .init-chat-bar')) return;
          setTimeout(function () {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 300);
        });
      })();

      /* ═══ Textarea 自动增高：每换行增加一行高 ═══════════════════ */
      (function () {
        function autoResize(el) {
          el.style.height = 'auto';
          el.style.height = el.scrollHeight + 'px';
        }
        document.addEventListener('input', function (e) {
          if (e.target.tagName === 'TEXTAREA' && e.target.id === 'globalChatInput') {
            autoResize(e.target);
          }
        });
        // 初始尺寸
        var ta = document.getElementById('globalChatInput');
        if (ta) autoResize(ta);

        // 发送按钮直接绑定（解决激活输入框后点击失效的问题）
        var sendBtn = document.querySelector('.global-chat-btn[data-cmd="globalChatSend"]');
        if (sendBtn) {
          sendBtn.addEventListener('click', function (e) {
            if (typeof window.YAQ.globalChatSend === 'function') {
              window.YAQ.globalChatSend();
            } else if (typeof window.globalChatSend === 'function') {
              window.globalChatSend();
            }
          });
        }
      })();

      /* ═══ 场景切换滚动位置保持 ═══════════════════════════════════ */
      /* 用户在各场景之间切换时，保存和恢复滚动位置，避免每次切换
         都回到顶部。使用 localStorage 持久化，刷新后依然保留。 */
      (function () {
        if (!window.YAQ) window.YAQ = {};
        var STORAGE_KEY = 'yaq-scroll-positions';
        var saveTimer = null;
        var centerEl = document.querySelector('.center');

        function getSceneId() {
          // 从 URL 或 scene-content 属性推断当前场景 ID
          var match = location.search.match(/scene=([^&]+)/);
          if (match) return match[1];
          var scene = document.getElementById('sceneContent');
          return scene ? scene.dataset.scene || 'default' : 'default';
        }

        function savePosition() {
          if (!centerEl) return;
          var scene = getSceneId();
          try {
            var data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            data[scene] = centerEl.scrollTop;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
          } catch (e) {}
        }

        function restorePosition() {
          if (!centerEl) return;
          var scene = getSceneId();
          try {
            var data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            var pos = data[scene];
            if (typeof pos === 'number' && pos > 0) {

                  '[style*="display: flex"]',
              );
              if (openModal) {
                e.preventDefault();
                closeModal(openModal);
              }
            }
            if (e.key === 'Tab') {
              var modal = document.querySelector(
                MODAL_SELECTOR +
                  '.open, ' +
                  MODAL_SELECTOR +
                  '[style*="display: block"], ' +
                  MODAL_SELECTOR +
                  '[style*="display: flex"]',
              );
              if (!modal) return;
              var focusable = modal.querySelectorAll(FOCUSABLE);
              if (focusable.length === 0) return;
              var first = focusable[0],
                last = focusable[focusable.length - 1];
              if (e.shiftKey) {
                if (document.activeElement === first) {
                  e.preventDefault();
                  last.focus();
                }
              } else {
                if (document.activeElement === last) {
                  e.preventDefault();
                  first.focus();
                }
              }
            }
          });

          var observer = new MutationObserver(function () {
            document.querySelectorAll(MODAL_SELECTOR).forEach(function (modal) {
              var isVisible =
                modal.classList.contains('open') ||
                (modal.style.display && modal.style.display !== 'none' && modal.style.display !== '');
              if (isVisible && !modal.dataset.focused) {
                modal.dataset.focused = '1';
                var first = modal.querySelector(FOCUSABLE);
                if (first)
                  setTimeout(function () {
                    first.focus();
                  }, 100);
              }
              if (!isVisible) {
                delete modal.dataset.focused;
              }
            });
          });
          observer.observe(document.body, { attributes: true, subtree: true, attributeFilter: ['class', 'style'] });
        })();
    </script>
  </body>
</html>
