<!doctype html>
<!--
  站长每日监管闭环工作台 Demo
  使用对象：街道/镇级安全生产与消防安全分管站长
  核心：判断 → 定位 → 处置 → 跟踪闭环
-->
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>站长每日监管闭环工作台</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    /* ════════════════════════════════════════════════════════════
       Tokens — 杨站长工作台 v18 配色体系
       ════════════════════════════════════════════════════════════ */
    :root{
      --bg:#f5f7fb;--card:#fff;--line:#e6ebf2;--text:#172033;--muted:#667085;--weak:#98a2b3;
      --blue:#1769e0;--blue-bg:#edf5ff;--red:#dc2626;--red-bg:#fff1f2;--orange:#d97706;--orange-bg:#fff7e6;
      --green:#15945f;--green-bg:#eaf8f1;--purple:#7c3aed;--purple-bg:#f4edff;--shadow:0 14px 34px rgba(20,40,80,.07);
      --radius:22px;--radius-sm:8px;
      --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
      /* ─── 兼容别名（旧 render 函数引用） ───────────────────────── */
      --surface:var(--card);--border:var(--line);--fg:var(--text);--fg-soft:#f2f4f7;
      --accent:var(--blue);--accent-soft:var(--blue-bg);--accent-light:#f2f7ff;
      --orange-soft:var(--orange-bg);--green-soft:var(--green-bg);--red-soft:var(--red-bg);
      --font-body:var(--font);--font-display:var(--font);--font-mono:ui-monospace,Menlo,monospace;
      --fs-h2:16px;--fs-h3:13.5px;--fs-body:13px;--fs-meta:11.5px;--fs-xs:10.5px;
      --radius-lg:20px;--gap-sm:8px;--gap-md:16px;--gap-lg:24px;
    }

    /* ─── Reset ─────────────────────────────────────────────────────── */
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;overflow:hidden}
    svg{display:block;flex-shrink:0}
    .lucide{display:inline-block;vertical-align:middle}
    a{color:inherit;text-decoration:none}
    button{font:inherit;cursor:pointer;border:none}
    p{margin:0}
    :focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:var(--radius-sm)}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

    /* ════════════════════════════════════════════════════════════
       杨站长工作台 v18 — Layout
       ════════════════════════════════════════════════════════════ */
    .app{width:100vw;height:100vh;padding:10px;overflow:hidden;display:flex;flex-direction:column}
    .top{flex-shrink:0;height:56px;border-radius:14px;background:#102b5b;color:#fff;padding:0 18px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow)}
    .brand{display:flex;align-items:center;gap:10px}.logo{width:34px;height:34px;border-radius:10px;background:#1769e0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px}.brand h1{margin:0;font-size:18px;font-weight:600}
    .meta{display:flex;gap:8px}.pill{padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.18);font-size:12px}
    .main{flex:1;min-height:0;margin-top:10px;display:grid;grid-template-columns:232px 1fr 300px;gap:10px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 8px 22px rgba(20,40,80,.045);overflow:hidden}
    .left,.center,.right{min-height:0;display:flex;flex-direction:column;gap:10px}

    /* ─── 左栏：侧边导航 ─────────────────────────────────────────── */
    .left.card{border-radius:14px 0 0 14px;border-right:none}
    .sidebar-brand{display:flex;align-items:center;gap:10px;padding:18px 16px 14px;border-bottom:1px solid var(--line);flex-shrink:0}
    .sidebar-brand .logo{width:32px;height:32px;border-radius:10px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;flex-shrink:0}
    .sidebar-brand span{font-size:16px;font-weight:700;color:var(--text)}
    .sidebar-nav{flex:1;min-height:0;overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column;gap:2px}
    .sidebar-foot{padding:8px;border-top:1px solid var(--line);flex-shrink:0}
    .sidebar-foot .nav-item{font-size:12px;color:var(--weak)}
    .nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;font-size:13.5px;font-weight:500;color:var(--muted);cursor:pointer;transition:background .1s,color .1s}
    .nav-item:hover{background:#f2f4f7;color:var(--text)}
    .nav-item.active{background:var(--blue-bg);color:var(--blue);font-weight:600}
    .nav-item svg{width:17px;height:17px;flex-shrink:0;opacity:.7}
    .nav-item.active svg{opacity:1}
    .nav-item .badge{margin-left:auto;font-size:9.5px;padding:2px 6px}
    .badge{display:inline-flex;align-items:center;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:850;white-space:nowrap}
    .badge.blue{background:var(--blue-bg);color:var(--blue)}.badge.red{background:var(--red-bg);color:var(--red)}
    .badge.orange{background:var(--orange-bg);color:#a75605}.badge.green{background:var(--green-bg);color:var(--green)}
    .badge.purple{background:var(--purple-bg);color:var(--purple)}.badge.gray{background:#f2f4f7;color:#667085}
    .badge.danger{background:var(--red-bg);color:var(--red)}

    /* ─── 中栏：内容区 ─────────────────────────────────────────── */
    .center{overflow:hidden}
    .result{flex:1;min-height:0;overflow:auto;padding:22px}
    .result-top{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:18px}
    .result-top h2{margin:0 0 7px;font-size:30px;letter-spacing:-.5px}
    .result-top p{margin:0;font-size:13px;color:var(--muted)}

    /* ─── 组件：KPI 网格 ────────────────────────────────────────── */
    .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
    .kpi{border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px}
    .kpi .label{font-size:12px;color:var(--muted);margin-bottom:8px}
    .kpi .value{font-size:25px;font-weight:950}
    .kpi .note{font-size:12px;color:var(--weak);margin-top:6px;line-height:1.35}

    /* ─── 组件：内容块 ──────────────────────────────────────────── */
    .block{border:1px solid var(--line);border-radius:20px;background:#fff;padding:16px;margin-bottom:14px}
    .block.bluebox{border-color:#d7e6ff;background:linear-gradient(135deg,#f2f7ff,#fff)}
    .block h3{margin:0 0 10px;font-size:16px}.block p{margin:0;color:#344054;font-size:14.5px;line-height:1.7}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}

    /* ─── 组件：表格 ────────────────────────────────────────────── */
    .table{width:100%;border-collapse:separate;border-spacing:0 8px;font-size:12.8px}
    .table th{text-align:left;color:var(--weak);font-size:12px;padding:0 8px}
    .table td{background:#fbfcff;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:9px 8px;color:#344054}
    .table td:first-child{border-left:1px solid var(--line);border-radius:11px 0 0 11px;font-weight:850;color:#172033}
    .table td:last-child{border-right:1px solid var(--line);border-radius:0 11px 11px 0}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}

    /* ─── 组件：进度条 ──────────────────────────────────────────── */
    .progress{display:flex;flex-direction:column;gap:12px}.prow{font-size:13px}
    .ptop{display:flex;justify-content:space-between;margin-bottom:7px;font-weight:850}
    .bar{height:10px;background:#eef2f6;border-radius:99px;overflow:hidden}
    .bar i{display:block;height:100%;background:var(--blue);border-radius:99px}
    .bar.warn i{background:#d97706}.bar.red i{background:#dc2626}

    /* ─── 右栏：设置 + 对话 ─────────────────────────────────────── */
    .right{overflow:hidden}
    .settings{flex:1;min-height:0;display:flex;flex-direction:column}
    .tabs{height:48px;padding:8px 10px;border-bottom:1px solid var(--line);display:flex;gap:6px;flex-shrink:0}
    .tab{border:none;border-radius:999px;background:#f2f4f7;color:#344054;padding:0 12px;font-size:12px;font-weight:850;cursor:pointer}
    .tab.active{background:var(--blue);color:#fff}
    .set-body{flex:1;min-height:0;overflow:auto;padding:16px}
    .field{margin-bottom:14px}.field label{display:block;font-size:12px;color:var(--muted);font-weight:850;margin-bottom:7px}
    .input,textarea,select{width:100%;border:1px solid var(--line);border-radius:14px;background:#fbfcff;padding:10px 12px;font-size:13px;color:#344054;outline:none;font-family:inherit}
    .input-sm{padding:8px 10px;font-size:12px}
    textarea{height:110px;line-height:1.55;resize:none}.spec{border:1px solid var(--line);border-radius:16px;background:#fbfcff;padding:12px;font-size:12.8px;color:#344054;line-height:1.65}.spec div+div{margin-top:10px}.spec b{color:#172033}
    .chat{height:200px;display:flex;flex-direction:column;border-top:1px solid var(--line)}
    .chat-body{flex:1;min-height:0;overflow:auto;padding:12px;background:#fafbfc}
    .msg{display:flex;margin-bottom:9px}.msg.agent{justify-content:flex-start}.msg.user{justify-content:flex-end}
    .bubble{max-width:92%;border-radius:15px;padding:9px 11px;font-size:12.8px;line-height:1.55}
    .agent .bubble{background:#fff;border:1px solid var(--line)}.user .bubble{background:var(--blue);color:#fff}
    .quick{display:flex;gap:7px;flex-wrap:wrap;padding:10px;border-top:1px solid var(--line);background:#fff;flex-shrink:0}
    .quick button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 9px;font-size:12px;cursor:pointer;color:#344054}

    /* ─── Toast ───────────────────────────────────────────────────── */
    .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#111827;color:#fff;border-radius:999px;padding:12px 16px;font-size:13px;display:none;z-index:999;box-shadow:0 12px 30px rgba(0,0,0,.2)}
    .toast.show{display:block}

    /* ════════════════════════════════════════════════════════════
       Compat: 场景渲染组件（旧 -> 新视觉）
       ════════════════════════════════════════════════════════════ */

    /* ─── AI 管家简报 ──────────────────────────────────────────── */
    .ai-briefing{display:flex;gap:14px;padding:16px 18px;border-radius:18px;border:1px solid #d7e6ff;background:linear-gradient(135deg,#f2f7ff,#fff);margin-bottom:16px}
    .ai-briefing-left{flex-shrink:0}
    .ai-avatar{width:38px;height:38px;border-radius:12px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center}
    .ai-briefing-body{flex:1;min-width:0}
    .ai-briefing-head{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px}
    .ai-briefing-text{font-size:13px;color:#344054;line-height:1.7}

    /* ─── 整体安全态势指标 ─────────────────────────────────────── */
    .situation-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .s-metric{border:1px solid var(--line);border-radius:14px;background:var(--card);padding:14px 10px;text-align:center}
    .s-metric .sm-value{font-size:26px;font-weight:950;color:var(--text);line-height:1.2}
    .s-metric .sm-unit{font-size:13px;font-weight:600;color:var(--weak)}
    .s-metric .sm-label{font-size:12.5px;font-weight:600;color:var(--muted);margin-top:4px}
    .s-metric .sm-sub{font-size:11px;color:var(--weak);margin-top:3px}
    .s-metric .sm-up{color:var(--red);font-weight:600}
    .s-metric.green-bg{border-color:var(--green);background:var(--green-bg)}
    .s-metric.orange-bg{border-color:#d97706;background:var(--orange-bg)}
    .sm-value.green{color:var(--green)}.sm-value.orange{color:#d97706}

    /* ─── 指标卡一排 ────────────────────────────────────────────── */
    .metric-row{display:flex;flex-wrap:wrap;gap:6px}
    .metric-card{border:1px solid var(--line);border-radius:10px;background:#fff;padding:10px 4px;text-align:center;min-width:64px;flex:1 0 auto;position:relative}
    .metric-card .mc-value{font-size:18px;font-weight:950;color:var(--text);line-height:1.2}
    .metric-card .mc-label{font-size:11px;color:var(--muted);margin-top:3px}
    .metric-card .mc-period{font-size:9px;font-weight:600;padding:1px 6px;border-radius:999px;display:inline-block;line-height:1.6;margin-top:3px}
    .mc-period.current{background:var(--blue-bg);color:var(--blue)}
    .mc-period.today{background:var(--orange-bg);color:#a75605}
    .mc-period.week{background:#f4edff;color:#7c3aed}
    .mc-period.month{background:var(--green-bg);color:var(--green)}
    .mc-period.quarter{background:#e6f9fb;color:#0891b2}
    .mc-period.year{background:#eef2ff;color:#4f46e5}
    .mc-period.d30{background:#e6f4f7;color:#0e7490}
    .mc-period.cum{background:#f2f4f7;color:#78716c}

    /* ─── 指标配置按钮 + 面板 ──────────────────────────────────── */
    .metric-config-btn{width:28px;height:28px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--muted);display:grid;place-items:center;cursor:pointer}
    .metric-config-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
    .metric-panel{position:absolute;top:36px;right:0;width:200px;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.1);padding:12px;z-index:50}
    .metric-panel label{display:flex;align-items:center;gap:6px;padding:5px 0;font-size:12.5px;color:var(--text);cursor:pointer}
    .metric-panel input[type=checkbox]{accent-color:var(--blue);margin:0}

    /* ─── 指标配置弹窗 ──────────────────────────────────────────── */
    .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:200;display:none}
    .modal-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:1080px;height:780px;background:var(--card);border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.15);z-index:210;display:none;flex-direction:column;overflow:hidden}
    .modal-head{flex-shrink:0;border-bottom:1px solid var(--line)}
    .modal-head-top{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 10px}
    .modal-close{width:28px;height:28px;border-radius:8px;border:none;background:transparent;color:var(--muted);cursor:pointer;display:grid;place-items:center}
    .modal-close:hover{background:var(--blue-bg);color:var(--blue)}
    #metricSearchInput:focus{border-color:var(--blue);background:#fff}
    .modal-filters{display:flex;gap:4px;padding:0 18px 12px;flex-wrap:wrap}
    .modal-filter-tab{padding:4px 10px;border-radius:999px;border:none;background:#f2f4f7;color:#667085;font-size:11.5px;font-weight:600;cursor:pointer}
    .modal-filter-tab.active{background:var(--blue);color:#fff}
    .modal-body{flex:1;overflow-y:auto;padding:14px 18px}
    .modal-body input[type=checkbox]{width:16px;height:16px;accent-color:var(--blue);margin:0;flex-shrink:0}

    /* ─── 面板中的指标预览卡片 ─────────────────────────────────── */
    .mc-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
    .metric-card.mc-dim{cursor:pointer}
    .metric-card.mc-active{cursor:pointer;position:relative}
    .mc-checkmark{display:none;position:absolute;top:3px;right:3px;width:14px;height:14px;border-radius:999px;background:var(--blue);color:#fff;align-items:center;justify-content:center}
    .mc-active .mc-checkmark{display:flex}
    .modal-foot{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-top:1px solid var(--line);flex-shrink:0}
    .modal-foot .mfoot-count{font-size:12px;color:var(--muted)}
    .modal-foot .mfoot-count strong{color:var(--blue)}
    .modal-foot .mfoot-actions{display:flex;gap:8px}
    .modal-foot .mfoot-btn{padding:7px 18px;border-radius:10px;border:1px solid var(--line);background:#fff;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer}
    .modal-foot .mfoot-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
    .modal-foot .mfoot-btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
    .modal-foot .mfoot-btn.primary:hover{opacity:.85}

    /* ─── 隐患详情弹窗 ──────────────────────────────────────────── */
    .hmodal-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:620px;max-height:80vh;background:var(--card);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.15);z-index:210;display:none;flex-direction:column;overflow:hidden}
    .hmodal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;border-bottom:1px solid var(--line);flex-shrink:0}
    .hmodal-title{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
    .hmodal-title .hmodal-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .hmodal-close{width:28px;height:28px;border-radius:8px;border:none;background:transparent;color:var(--muted);cursor:pointer;display:grid;place-items:center;font-size:16px}
    .hmodal-close:hover{background:#f2f4f7;color:#344054}
    .hmodal-body{flex:1;overflow-y:auto;padding:14px 18px 18px}
    .hmodal-row{display:flex;padding:6px 0;border-bottom:1px solid #f0f2f5;font-size:13px}
    .hmodal-row:last-child{border-bottom:none}
    .hmodal-label{width:90px;flex-shrink:0;color:var(--weak);font-weight:500}
    .hmodal-value{flex:1;color:var(--text)}

    /* ─── 已选指标拖拽 ─────────────────────────────────────────── */
    .sel-card-drag{cursor:grab;user-select:none;position:relative}
    .sel-card-drag.dragging{opacity:.4}
    .sel-card-drag.drag-before::before,.sel-card-drag.drag-after::after{content:'';position:absolute;top:2px;bottom:2px;width:2px;background:var(--blue);border-radius:2px;z-index:5}
    .sel-card-drag.drag-before::before{left:-1px}
    .sel-card-drag.drag-after::after{right:-1px}
    .sel-hover-remove{display:none;position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:999px;background:var(--red);color:#fff;align-items:center;justify-content:center;cursor:pointer;z-index:10;box-shadow:0 1px 4px rgba(0,0,0,.15)}
    .sel-card-drag:hover .sel-hover-remove{display:flex}
    #selectedMetricsList::-webkit-scrollbar{height:4px}
    #selectedMetricsList::-webkit-scrollbar-thumb{background:#d0d5dd;border-radius:999px}
    #selectedMetricsList::-webkit-scrollbar-track{background:transparent}

    /* ─── 指标说明浮层 ──────────────────────────────────────────── */
    .metric-tip{position:fixed;padding:8px 12px;background:#1f2937;color:#fff;font-size:12px;line-height:1.5;border-radius:10px;max-width:280px;z-index:999;pointer-events:none;display:none;box-shadow:0 8px 24px rgba(0,0,0,.2)}
    .metric-tip.show{display:block}

    /* ─── 四级风险底数 ──────────────────────────────────────────── */
    .risk-four{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .risk-four-item{border:1px solid var(--line);border-radius:14px;background:var(--card);padding:12px 8px;text-align:center}
    .risk-four-item .rf-value{font-size:26px;font-weight:950;line-height:1.1;display:flex;align-items:baseline;justify-content:center;gap:4px}
    .risk-four-item .rf-delta{font-size:11px;font-weight:700;line-height:1}
    .risk-four-item .rf-delta.up{color:var(--red)}.risk-four-item .rf-delta.down{color:var(--green)}.risk-four-item .rf-delta.stable{color:var(--weak)}
    .risk-four-item .rf-label{font-size:12px;font-weight:600;margin-top:4px}
    .risk-four-item .rf-sub{font-size:10.5px;color:var(--weak);margin-top:2px}
    .risk-major .rf-value{color:var(--red)}.risk-major{border-top:3px solid var(--red)}
    .risk-significant .rf-value{color:#d97706}.risk-significant{border-top:3px solid #d97706}
    .risk-general .rf-value{color:var(--blue)}.risk-general{border-top:3px solid var(--blue)}
    .risk-low .rf-value{color:var(--green)}.risk-low{border-top:3px solid var(--green)}

    /* ─── 区域风险变化 ──────────────────────────────────────────── */
    .region-list{display:flex;flex-direction:column;gap:6px}
    .region-item{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f0f2f5;font-size:12.5px}
    .region-item:last-child{border-bottom:none}
    .region-name{color:var(--text);font-weight:500}
    .region-trend{display:inline-flex;align-items:center;gap:3px;font-size:11.5px;font-weight:600}

      gap: 8px;
      padding: 10px 12px;
      background: var(--orange-soft);
      border-radius: var(--radius);
      font-size: 12px;
      line-height: 1.5;
    }
    .eff-alert svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; color: var(--orange); }
    .eff-alert-text { flex: 1; }
    .eff-alert-text strong { font-weight: 600; }
    .eff-alert-text .eff-alert-action {
      color: var(--accent);
      font-weight: 500;
      cursor: pointer;
    }

    /* ════════════════════════════════════════════════════════════
       Scene 4: 主体责任评估
       ════════════════════════════════════════════════════════════ */
    .matrix-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--gap-md);
    }
    .matrix-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-align: center;
      align-items: center;
    }
    .matrix-card-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: grid;
      place-items: center;
    }
    .matrix-card-icon svg { width: 18px; height: 18px; }
    .matrix-card-icon.green { background: var(--green-soft); color: var(--green); }
    .matrix-card-icon.orange { background: var(--orange-soft); color: var(--orange); }
    .matrix-card-icon.red { background: var(--red-soft); color: var(--red); }
    .matrix-card-icon.neutral { background: var(--fg-soft); color: var(--muted); }
    .matrix-card-title { font-size: 12.5px; font-weight: 600; }
    .matrix-card-desc { font-size: var(--fs-xs); color: var(--muted); line-height: 1.4; }

    .subject-table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .subject-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
    }
    .subject-table th {
      text-align: left;
      padding: 10px 14px;
      background: var(--fg-soft);
      font-weight: 500;
      color: var(--muted);
      font-size: 11.5px;
      border-bottom: 1px solid var(--border);
    }
    .subject-table td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .subject-table tr:last-child td { border-bottom: none; }
    .subject-table tr:hover td { background: var(--accent-light); }
    .st-risk {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
    }
    .st-risk.high { background: var(--red-soft); color: var(--red); }
    .st-risk.mid { background: var(--orange-soft); color: var(--orange); }
    .st-risk.low { background: var(--fg-soft); color: var(--muted); }

    /* ════════════════════════════════════════════════════════════
       Scene 5: 分级处置闭环
       ════════════════════════════════════════════════════════════ */
    .disposal-level { margin-bottom: var(--gap-md); }
    .disposal-level:last-child { margin-bottom: 0; }
    .dl-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .dl-head .dl-tag {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 999px;
    }
    .dl-head .dl-tag.level-1 { background: var(--green-soft); color: var(--green); }
    .dl-head .dl-tag.level-2 { background: var(--accent-soft); color: var(--accent); }
    .dl-head .dl-tag.level-3 { background: var(--orange-soft); color: var(--orange); }
    .dl-head .dl-tag.level-4 { background: var(--red-soft); color: var(--red); }
    .dl-head .dl-tag.level-5 { background: oklch(45% 0.2 30 / 12%); color: oklch(45% 0.2 30); }
    .dl-title { font-size: 13px; font-weight: 600; }

    .dl-list { display: flex; flex-direction: column; gap: 6px; }
    .dl-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12.5px;
      transition: border-color 0.12s;
    }
    .dl-item:hover { border-color: var(--accent); }
    .dl-item-icon { width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; flex-shrink: 0; }
    .dl-item-icon.level-1 { background: var(--green-soft); color: var(--green); }
    .dl-item-icon.level-2 { background: var(--accent-soft); color: var(--accent); }
    .dl-item-icon.level-3 { background: var(--orange-soft); color: var(--orange); }
    .dl-item-icon.level-4 { background: var(--red-soft); color: var(--red); }
    .dl-item-icon.level-5 { background: color-mix(in oklch, oklch(45% 0.2 30) 12%, transparent); color: oklch(45% 0.2 30); }
    .dl-item-icon svg { width: 15px; height: 15px; }
    .dl-item-body { flex: 1; }
    .dl-item-title { font-weight: 500; }
    .dl-item-desc { font-size: var(--fs-xs); color: var(--muted); margin-top: 1px; }
    .dl-item-action {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: var(--fs-xs);
      color: var(--muted);
      transition: all 0.12s;
    }
    .dl-item-action:hover { border-color: var(--accent); color: var(--accent); }
    .dl-item-action svg { width: 12px; height: 12px; }

    /* ─── Drawer Overlay & Panel ────────────────────────────────── */
    .drawer-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.25);z-index:100;opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s}
    .drawer-overlay.open{opacity:1;visibility:visible}
    .drawer-panel{position:fixed;top:0;right:-460px;width:440px;height:100vh;background:var(--card);border-left:1px solid var(--line);z-index:110;display:flex;flex-direction:column;transition:right .3s cubic-bezier(.22,1,.36,1);box-shadow:-4px 0 20px rgba(0,0,0,.06)}
    .drawer-panel.open{right:0}
    .drawer-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line);flex-shrink:0}
    .drawer-header h3{margin:0;font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px}
    .drawer-header h3 svg{width:18px;height:18px}
    .drawer-close{width:30px;height:30px;border-radius:8px;border:none;background:transparent;display:grid;place-items:center;color:var(--muted);cursor:pointer}
    .drawer-close:hover{background:#f2f4f7}
    .drawer-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;font-size:13px;line-height:1.6}
    .drawer-section{display:flex;flex-direction:column;gap:4px}
    .drawer-section-label{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.02em}
    .drawer-section-value{font-size:13px;line-height:1.6;color:var(--text)}
    .drawer-divider{height:1px;background:var(--line);margin:4px 0}
    .drawer-footer{display:flex;gap:10px;padding:14px 20px;border-top:1px solid var(--line);flex-shrink:0}
    .drawer-btn{flex:1;padding:9px 0;border-radius:13px;border:1px solid var(--line);background:var(--card);font-size:12.5px;font-weight:500;color:var(--text);text-align:center;cursor:pointer}
    .drawer-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
    .drawer-btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
    .drawer-btn.primary:hover{opacity:.85}

    /* ─── Entrance animations ─────────────────────────────────────── */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .scene-content > * {
      animation: fade-up 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .scene-content > *:nth-child(1) { animation-delay: 0ms; }
    .scene-content > *:nth-child(2) { animation-delay: 60ms; }
    .scene-content > *:nth-child(3) { animation-delay: 120ms; }
    .scene-content > *:nth-child(4) { animation-delay: 180ms; }
    .scene-content > *:nth-child(5) { animation-delay: 240ms; }
    .scene-content > *:nth-child(6) { animation-delay: 300ms; }

    /* ─── Scanning overlay ────────────────────────────────────────── */
    .result.scanning::before {
      content: '';
      position: absolute; inset:0; z-index:5;
      background:rgba(245,247,251,.7);
      animation: scan-overlay 0.5s ease-out forwards;
      pointer-events:none;
    }
    @keyframes scan-overlay {
      0%   { opacity: 1; }
      70%  { opacity: 1; }
      100% { opacity: 0; }
    }
    .result{position:relative}
  </style>
</head>

              '<td style="padding:4px 6px;font-weight:500"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:' + gRisk + ';margin-right:4px;vertical-align:middle"></span>' + g.name + '</td>' +

    // ─── Hazard Report ───────────────────────────────────────────────

    function renderHazardReport() {
      var h = MOCK.hazards;

      // Status change indicator
      function statusChange(prev, cur, prevCls, curCls) {
        if (prev === cur) return '<span style="color:var(--muted);font-size:11px">→ 无变化</span>';
        var improved = (prevCls === 'danger' && curCls !== 'danger') || (prevCls === 'warning' && curCls === 'stable');
        return improved
          ? '<span style="color:var(--green);font-size:11px"><i data-lucide="trending-up" width="12" height="12"></i> 改善</span>'
          : '<span style="color:var(--red);font-size:11px"><i data-lucide="trending-down" width="12" height="12"></i> 恶化</span>';
      }

      var rows = '';
      for (var i = 0; i < h.length; i++) {
        rows += '<tr><td>' + h[i].object + '</td><td>' + h[i].hazard + '</td><td>' + h[i].region + '</td>' +
          '<td><span class="ht-status ' + h[i].prevStatusCls + '" style="font-size:10px">' + h[i].prevStatus + '</span></td>' +
          '<td><span class="ht-status ' + h[i].statusCls + '">' + h[i].status + '</span>' +
            '<div style="margin-top:2px">' + statusChange(h[i].prevStatus, h[i].status, h[i].prevStatusCls, h[i].statusCls) + '</div></td>' +
          '<td>' + h[i].person + '</td>' +
          '<td><div class="ht-actions"><button class="ht-action-btn primary" title="督办" onclick="openDrawer(\'supervise\')"><i data-lucide="megaphone" aria-hidden="true"></i></button><button class="ht-action-btn" title="现场核查" onclick="openDrawer(\'inspect\')"><i data-lucide="search" aria-hidden="true"></i></button><button class="ht-action-btn" title="会议议题" onclick="openDrawer(\'meeting\')"><i data-lucide="calendar" aria-hidden="true"></i></button><button class="ht-action-btn" title="持续跟踪" onclick="showToast(\'已加入持续跟踪\')"><i data-lucide="pin" aria-hidden="true"></i></button></div></td></tr>';
      }

      // 隐患回头看
      var reviewItems = '';
      for (var ri = 0; ri < h.length; ri++) {
        if (h[ri].statusCls === 'danger' || h[ri].statusCls === 'warning') {
          reviewItems += '<div class="info-list-item"><div class="il-left"><i data-lucide="alert-circle" aria-hidden="true" style="color:' + (h[ri].statusCls === 'danger' ? 'var(--red)' : 'var(--orange)') + '"></i>' +
            '<span class="il-label"><strong>' + h[ri].object + '</strong> · ' + h[ri].hazard + '</span></div></div>' +
            '<div style="padding:2px 0 6px 24px;font-size:11.5px;color:var(--muted);border-bottom:1px solid var(--border)">' +
            '临时管控：' + h[ri].measures + '<br>整改方案：' + h[ri].plan + '<br>时间表：' + h[ri].timeline +
            ' · 责任人：' + h[ri].person +
            '</div>';
        }
      }

      return '' +
        '<div class="hazard-stats-row">' +
          '<div class="hazard-stat"><div class="hazard-stat-value danger">' + countByStatus(h, '超期未整改') + '</div><div class="hazard-stat-label">超期未整改</div><div class="hazard-stat-sub">较昨日 <span class="delta-up">+0</span> ⚠ 一周前也是这 2 项</div></div>' +
          '<div class="hazard-stat"><div class="hazard-stat-value warning">' + countByStatus(h, '即将到期') + '</div><div class="hazard-stat-label">即将到期</div><div class="hazard-stat-sub">3 天内到期</div></div>' +
          '<div class="hazard-stat"><div class="hazard-stat-value">' + countByStatus(h, '整改中') + '</div><div class="hazard-stat-label">整改推进中</div><div class="hazard-stat-sub"><span class="delta-down">较昨日改善 +1</span></div></div>' +
          '<div class="hazard-stat"><div class="hazard-stat-value warning">' + countByStatus(h, '反复出现') + '</div><div class="hazard-stat-label">反复出现</div><div class="hazard-stat-sub">已持续 2 周</div></div>' +
        '</div>' +

        // 隐患回头看
        '<div class="info-card">' +
          '<div class="info-card-head"><h3><i data-lucide="eye" aria-hidden="true" style="color:var(--red)"></i> 重大隐患回头看</h3><span class="info-card-badge danger">需确认 ' + countByStatus(h, '超期未整改') + '</span></div>' +
          '<div class="info-list">' + reviewItems + '</div>' +
        '</div>' +

        // 表格（含状态变化列）
        '<div class="hazard-table-wrap">' +
        '<table class="hazard-table">' +
        '<thead><tr><th>对象</th><th>隐患</th><th>区域/条线</th><th>昨日状态</th><th>当前状态</th><th>责任</th><th style="width:140px">站长动作</th></tr></thead>' +
        '<tbody>' + rows + '</tbody></table></div>';
    }

    function countByStatus(arr, status) {
      var c = 0;
      for (var i = 0; i < arr.length; i++) { if (arr[i].status.indexOf(status) > -1 || (status === arr[i].status)) c++; }
      return c;
    }

      html += '</div></div>';

      return html;

    function openDrawer(action) {
      var content = drawerContent[action];
      if (!content) return;

      document.getElementById('drawerTitle').innerHTML = '<i data-lucide="' + getDrawerIcon(action) + '" aria-hidden="true"></i> ' + content.title;

      var bodyHtml = '';
      for (var i = 0; i < content.sections.length; i++) {
        var sec = content.sections[i];
        bodyHtml += '<div class="drawer-section"><div class="drawer-section-label">' + sec.label + '</div><div class="drawer-section-value">' + sec.value.replace(/\n/g, '<br>') + '</div></div>';
        if (i < content.sections.length - 1) bodyHtml += '<div class="drawer-divider"></div>';
      }
      document.getElementById('drawerBody').innerHTML = bodyHtml;
      lucide.createIcons();

      document.getElementById('drawerPanel').classList.add('open');
      document.getElementById('drawerOverlay').classList.add('open');
    }

    function closeDrawer() {
      document.getElementById('drawerPanel').classList.remove('open');
      document.getElementById('drawerOverlay').classList.remove('open');
    }

    function getDrawerIcon(action) {
      var map = { briefing: 'file-text', supervise: 'megaphone', meeting: 'calendar', inspect: 'search', remind: 'bell' };
      return map[action] || 'file-text';
    }

    // HAZARD DETAIL
    // ════════════════════════════════════════════════════════════════

    function openHazardDetail(objectName) {
      var arr = window.__majorHazards || [];
      var h = null;
      for (var i = 0; i < arr.length; i++) {
        if (arr[i].object === objectName) { h = arr[i]; break; }
      }
      if (!h) { showToast('未找到隐患数据'); return; }

      var dotColor = h.level.indexOf('重大') > -1 ? 'var(--red)' : '#d97706';
      document.getElementById('hazardModalName').textContent = h.object;
      document.getElementById('hazardModalDot').style.background = dotColor;

      // — 顶部状态区 —
      var statusBadge = '<span class="hc-status ' + h.statusCls + '" style="font-size:11px;padding:2px 8px">' + h.status + '</span>';
      var overdueHtml = h.overdue > 0 ? '<span style="color:var(--red);font-weight:700;font-size:13px">⚠ 逾期 ' + h.overdue + ' 天</span>' : '';
      var bodyHtml =
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;background:color-mix(in oklch, var(--red) 12%, #fff);color:var(--red)">' + h.level + '</span>' +
          statusBadge +
        '</div>' +
        (overdueHtml ? '<div>' + overdueHtml + '</div>' : '') +
      '</div>' +
      // — 隐患描述（突出）—
      '<div style="font-size:14px;font-weight:600;color:var(--text);line-height:1.5;margin-bottom:12px;padding:10px 12px;background:var(--fg-soft);border-radius:10px">' + h.hazard.replace(/\n/g, '<br>') + '</div>' +
      // — 整改建议（突出）—
      '<div style="font-size:10px;font-weight:600;color:var(--weak);margin-bottom:4px;letter-spacing:0.05em">整改建议</div>' +
      '<div style="font-size:13px;color:#344054;line-height:1.6;margin-bottom:14px;padding:8px 12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px">' + (h.suggestion || '—') + '</div>' +
      // — 基础信息（两列简洁）—
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px 16px;margin-bottom:10px">' +
        '<div style="font-size:11.5px;color:var(--muted);padding:2px 0"><span style="color:var(--weak)">对象</span> ' + h.object + '</div>' +
        '<div style="font-size:11.5px;color:var(--muted);padding:2px 0"><span style="color:var(--weak)">责任人</span> ' + (h.person || '—') + '</div>' +
        '<div style="font-size:11.5px;color:var(--muted);padding:2px 0"><span style="color:var(--weak)">发现</span> ' + (h.discoverer || '—') + ' / ' + h.foundDate + '</div>' +
        '<div style="font-size:11.5px;color:var(--muted);padding:2px 0"><span style="color:var(--weak)">期限</span> ' + h.deadline + '</div>' +
        '<div style="font-size:11.5px;color:var(--muted);padding:2px 0"><span style="color:var(--weak)">来源</span> ' + h.source + '</div>' +
        '<div style="font-size:11.5px;color:var(--muted);padding:2px 0"><span style="color:var(--weak)">片区</span> ' + (h.region || '—') + '</div>' +
      '</div>' +
      // — 依据（可折叠）—
      '<div id="regulationWrap" style="margin-bottom:6px">' +
        '<div onclick="toggleRegulation()" style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--weak);cursor:pointer;user-select:none">' +
          '<span id="regArrow">▶</span> 关联法规依据' +
        '</div>' +
        '<div id="regulationBody" style="display:none;margin-top:4px;font-size:11.5px;color:var(--muted);padding:6px 10px;background:#f9fafb;border-radius:8px">' + (h.regulation || '无') + '</div>' +
      '</div>';

      // 现场证据（图片区域单独展示）
      bodyHtml += '<div style="border-bottom:1px solid var(--line);margin:8px 0"></div>';
      bodyHtml += '<div style="font-size:10px;font-weight:600;color:var(--weak);margin-bottom:8px;letter-spacing:0.05em">现场证据</div>';
      // 问题快照
      var photoCount = h.hasPhoto ? 3 : 0;
      bodyHtml += '<div class="hmodal-row" style="align-items:flex-start;padding-top:10px"><div class="hmodal-label">问题快照</div><div class="hmodal-value"><div style="display:flex;gap:8px;flex-wrap:wrap">';
      if (photoCount > 0) {
        for (var pi = 1; pi <= photoCount; pi++) {
          bodyHtml += '<div style="width:80px;height:60px;border-radius:8px;background:#f2f4f7;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--weak)"><i data-lucide="image" width="16" height="16" style="opacity:.4"></i></div>';
        }
      } else {
        bodyHtml += '<span style="font-size:11px;color:var(--weak)">无</span>';
      }
      bodyHtml += '</div></div></div>';
      // 整改结果
      bodyHtml += '<div class="hmodal-row" style="align-items:flex-start;padding-top:10px"><div class="hmodal-label">整改结果</div><div class="hmodal-value">' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px">' +
        (h.resultPhoto ? '<div style="width:80px;height:60px;border-radius:8px;background:#e8f5e9;border:1px solid #c8e6c9;display:flex;align-items:center;justify-content:center;font-size:10px;color:#2e7d32"><i data-lucide="check-circle" width="16" height="16"></i></div>' : '') +
        '</div>' +
        (h.resultText ? '<div style="font-size:12px;color:var(--text);line-height:1.5">' + h.resultText + '</div>' : '') +
      '</div></div>';
      document.getElementById('hazardModalBody').innerHTML = bodyHtml;

      document.getElementById('hazardModalOverlay').style.display = 'block';
      document.getElementById('hazardModal').style.display = 'flex';
    }

    function closeHazardModal() {
      document.getElementById('hazardModalOverlay').style.display = 'none';
      document.getElementById('hazardModal').style.display = 'none';
    }
    window.openHazardDetail = openHazardDetail;
    window.closeHazardModal = closeHazardModal;

    function toggleRegulation() {
      var body = document.getElementById('regulationBody');
      var arrow = document.getElementById('regArrow');
      if (!body) return;
      var isOpen = body.style.display !== 'none';
      body.style.display = isOpen ? 'none' : 'block';
      arrow.textContent = isOpen ? '▶' : '▼';
    }

    // ════════════════════════════════════════════════════════════════
    // SCENE SWITCHING
    // ════════════════════════════════════════════════════════════════

    function switchScene(sceneId) {
      if (sceneId === state.activeScene) return;
      state.activeScene = sceneId;

      var ws = document.getElementById('workspace');
      ws.classList.add('scanning');

      // 同步左栏场景高亮
      document.querySelectorAll('.nav-item[data-scene]').forEach(function(n) {
        n.classList.toggle('active', n.getAttribute('data-scene') === sceneId);
      });

      // 同步右栏场景提示
      var chatBody = document.getElementById('chatBody');
      var sceneNames = { dashboard: '📊 今日监管工作台', 'hazard-report': '⚠ 重大隐患整改日报', efficiency: '📈 履职效能分析', responsibility: '👥 主体责任评估', disposal: '🔁 分级处置闭环' };

      setTimeout(function() {
        renderScene(sceneId);
        ws.classList.remove('scanning');

        // AI 对话追加系统消息
        var name = sceneNames[sceneId] || sceneId;
        chatBody.innerHTML += '<div class="msg agent"><div class="bubble">已切换到「' + name + '」，你需要关注什么？</div></div>';
        chatBody.scrollTop = chatBody.scrollHeight;

        showToast('已切换至「' + name + '」');
      }, 250);
    }

    // ════════════════════════════════════════════════════════════════
    // BIND INTERACTIONS
    // ════════════════════════════════════════════════════════════════

    function bindInteractions() {
      // 左栏侧边导航点击
      document.querySelectorAll('.nav-item[data-scene]').forEach(function(item) {
        item.addEventListener('click', function() {
          var scene = this.getAttribute('data-scene');
          if (['review', 'meeting'].indexOf(scene) > -1) {
            showToast('后续能力，敬请期待');
            return;
          }
          switchScene(scene);
        });
      });

      // 右栏 Tab 切换
      document.querySelectorAll('.tab[data-tab]').forEach(function(tab) {
        tab.addEventListener('click', function() {
          document.querySelectorAll('.tab[data-tab]').forEach(function(t) { t.classList.remove('active'); });
          this.classList.add('active');
          var tabName = this.getAttribute('data-tab');
          document.getElementById('chatTab').style.display = tabName === 'chat' ? 'flex' : 'none';
          document.getElementById('configTab').style.display = tabName === 'config' ? 'block' : 'none';
        });
      });

      // Drawer overlay close
      document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);
      document.getElementById('drawerClose').addEventListener('click', closeDrawer);
      document.getElementById('drawerCancel').addEventListener('click', closeDrawer);

      // Drawer confirm
      document.getElementById('drawerConfirm').addEventListener('click', function() {
        closeDrawer();
        showToast('已生成，可继续编辑');
      });

      // Escape key
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          if (document.getElementById('drawerPanel').classList.contains('open')) {
            closeDrawer();
          }
        }
      });

      // Priority item action buttons (delegated)
      document.getElementById('sceneContent').addEventListener('click', function(e) {
        var btn = e.target.closest('[data-pi-action]');
        if (btn) {
          var action = btn.getAttribute('data-pi-action');
          var actionMap = { '督办': 'supervise', '现场核查': 'inspect', '会议议题': 'meeting', '提醒履职': 'remind', '跟踪': 'briefing' };
          var mapped = actionMap[action];
          if (mapped) openDrawer(mapped);
          else showToast('已记录' + action + '操作');
          e.stopPropagation();
          return;
        }

        // Priority item click → drill down
        var item = e.target.closest('.priority-item');
        if (item) {
          var id = item.getAttribute('data-pi-id');
          showToast('查看#' + id + ' 详情（钻取功能）');
        }
      });
    }

    function agentAsk(sceneId) {
      var chatBody = document.getElementById('chatBody');
      var sceneNames = { dashboard: '📊 今日监管工作台', 'hazard-report': '⚠ 重大隐患整改日报', efficiency: '📈 履职效能分析', responsibility: '👥 主体责任评估', disposal: '🔁 分级处置闭环' };

    // ════════════════════════════════════════════════════════════════
    // 指标配置
    // ════════════════════════════════════════════════════════════════

    function renderSelectedMetrics(metrics) {
      var order = window.__metricOrder || [];
      // 按存储顺序排序
      var checked = [];
      for (var i = 0; i < metrics.length; i++) {
        if (metrics[i].checked) checked.push(metrics[i]);
      }
      checked.sort(function(a, b) {
        var ai = order.indexOf(a.id);
        var bi = order.indexOf(b.id);
        if (ai === -1 && bi === -1) return 0;
        if (ai === -1) return 1;
        if (bi === -1) return -1;
        return ai - bi;
      });
      var html = '';
      for (var j = 0; j < checked.length; j++) {
        var m = checked[j];
        var periodDisp = m.type === '时点' ? '截至目前' : m.period;
        var bCls = ({'截至目前':'current','今日':'today','本周':'week','本月':'month','本季':'quarter','本年':'year','近30天':'d30','累计':'cum'})[periodDisp] || '';
        html += '<div class="metric-card" data-desc="' + (m.desc || '') + '" onmouseenter="showMetricTip(event,this.getAttribute(\'data-desc\'))" onmouseleave="hideMetricTip()">' +
          '<div class="mc-value"' + (m.valueColor ? ' style="color:' + m.valueColor + '"' : '') + '>' + m.value + '</div>' +
          '<div class="mc-label">' + m.label + '</div>' +
          '<div class="mc-period ' + bCls + '">' + periodDisp + '</div>' +
        '</div>';
      }
      return html;
    }

    function cycleMetricPeriod(id) {
      var metrics = window.__allMetrics || [];
      for (var i = 0; i < metrics.length; i++) {
        if (metrics[i].id === id) {
          var m = metrics[i];
          if (!m.periods) return;
          var idx = m.periods.indexOf(m.period);
          m.period = m.periods[(idx + 1) % m.periods.length];
          renderMetricCheckboxes();
          break;
        }
      }
    }

    function openMetricConfig() {
      // 保存当前快照，用于取消时还原
      var metrics = window.__allMetrics || [];
      window.__metricSnapshot = [];
      for (var i = 0; i < metrics.length; i++) {
        window.__metricSnapshot.push({
          id: metrics[i].id,
          checked: metrics[i].checked,
          period: metrics[i].period
        });
      }
      // 清空搜索
      window.__metricSearch = '';
      var input = document.getElementById('metricSearchInput');
      if (input) input.value = '';
      document.getElementById('metricModalOverlay').style.display = 'block';
      document.getElementById('metricModal').style.display = 'flex';
      renderMetricCheckboxes();
      lucide.createIcons();
    }

    function closeMetricConfig() {
      // 取消时还原快照
      var snap = window.__metricSnapshot || [];
      var metrics = window.__allMetrics || [];
      for (var i = 0; i < snap.length; i++) {
        for (var j = 0; j < metrics.length; j++) {
          if (metrics[j].id === snap[i].id) {
            metrics[j].checked = snap[i].checked;
            metrics[j].period = snap[i].period;
            break;
          }
        }
      }
      document.getElementById('metricModalOverlay').style.display = 'none';
      document.getElementById('metricModal').style.display = 'none';
    }

    function renderMetricCheckboxes() {
      var metrics = window.__allMetrics || [];
      var activeFilter = window.__metricFilter || '全部';
      var activePeriod = window.__metricPeriodFilter || '全部周期';
      // 分组筛选（业务视角，非全部分组）
      var filterGroupMap = {
        '全部': null,
        '今日关注': ['今日聚焦'],
        '隐患治理': ['隐患闭环', '重大隐患', '风险分类'],
        '监管执法': ['监管执法', '执法处置'],
        '履职效能': ['履职效能', '主体责任', '区域风险', '风险结构', '专项任务', '监管概况']
      };
      var filterLabels = Object.keys(filterGroupMap);
      var filterHtml = '';
      for (var f = 0; f < filterLabels.length; f++) {
        filterHtml += '<button class="modal-filter-tab' + (filterLabels[f] === activeFilter ? ' active' : '') + '" onclick="setMetricFilter(\'' + filterLabels[f] + '\')">' + filterLabels[f] + '</button>';
      }
      // 周期过滤标签
      var periodFilters = ['全部周期', '截至目前', '今日', '本周', '本月', '本季', '本年', '近30天', '累计'];
      filterHtml += '<span style="width:1px;height:18px;background:var(--line);margin:0 6px;display:inline-block;vertical-align:middle"></span>';
      for (var pf = 0; pf < periodFilters.length; pf++) {
        filterHtml += '<button class="modal-filter-tab' + (periodFilters[pf] === activePeriod ? ' active' : '') + '" onclick="setPeriodFilter(\'' + periodFilters[pf] + '\')">' + periodFilters[pf] + '</button>';
      }
      document.getElementById('metricFilterTabs').innerHTML = filterHtml;

      // 按业务视角 + 周期 + 搜索过滤
      var activeGroups = activeFilter === '全部' ? null : (filterGroupMap[activeFilter] || null);
      var groups = {};
      for (var i = 0; i < metrics.length; i++) {
        var m = metrics[i];
        if (activeGroups && activeGroups.indexOf(m.group) === -1) continue;
        if (activePeriod !== '全部周期') {
          if (activePeriod === '截至目前') {
            if (m.type !== '时点' && m.period !== '截至目前') continue;
          } else if (activePeriod === '累计' && m.type !== '累计') continue;
          else if (m.period !== activePeriod) continue;
        }
        var searchQ = (window.__metricSearch || '').trim().toLowerCase();
        if (searchQ && m.label.toLowerCase().indexOf(searchQ) === -1) continue;
        if (!groups[m.group]) groups[m.group] = [];
        groups[m.group].push(m);
      }
      var html = '';
      var groupOrder = ['今日聚焦', '监管概况', '监管执法', '隐患闭环', '重大隐患', '主体责任', '履职效能', '区域风险', '风险结构', '专项任务', '执法处置', '风险分类'];
      function panelPeriodRange(type, period) {
        if (type === '时点') return '截至目前';
        if (period === '近30天') return '近30天';
        return period;
      }
      for (var g = 0; g < groupOrder.length; g++) {
        var groupName = groupOrder[g];
        var items = groups[groupName];
        if (!items) continue;
        html += '<div style="font-size:11px;font-weight:600;color:var(--weak);margin-bottom:8px;margin-top:' + (g > 0 ? '14px' : '0') + ';letter-spacing:0.03em">' + groupName + '</div>';
        html += '<div class="mc-grid">';
        for (var j = 0; j < items.length; j++) {
          var m = items[j];
          var periodDisp2 = panelPeriodRange(m.type, m.period);
          var bCls = ({'截至目前':'current','今日':'today','本周':'week','本月':'month','本季':'quarter','本年':'year','近30天':'d30','累计':'cum'})[periodDisp2] || '';
          html += '<div class="metric-card' + (m.checked ? ' mc-active' : ' mc-dim') + '" data-id="' + m.id + '" onclick="toggleMiniCard(this)" data-desc="' + (m.desc || '') + '" onmouseenter="showMetricTip(event,this.getAttribute(\'data-desc\'))" onmouseleave="hideMetricTip()">' +
            '<span class="mc-checkmark"><i data-lucide="check" width="10" height="10"></i></span>' +
            '<div class="mc-value"' + (m.valueColor ? ' style="color:' + m.valueColor + '"' : '') + '>' + m.value + '</div>' +
            '<div class="mc-label">' + m.label + '</div>' +
            '<div class="mc-period ' + bCls + '">' + periodDisp2 + '</div>' +
          '</div>';
        }
        html += '</div>';
      }
      document.getElementById('metricCheckboxes').innerHTML = html || '<div style="text-align:center;padding:30px 0;color:var(--weak);font-size:13px">该分组暂无指标</div>';

      // 渲染已选指标列表（拖拽排序）
      renderSelectedMetricsList();

      // 更新已选计数
      var allMet = window.__allMetrics || [];
      var checkedCount = 0;
      for (var ci = 0; ci < allMet.length; ci++) {
        if (allMet[ci].checked) checkedCount++;
      }
      var countEl = document.getElementById('mfootCount');
      if (countEl) countEl.innerHTML = '已选 <strong>' + checkedCount + '</strong> 个指标';
    }

    function renderSelectedMetricsList() {
      var metrics = window.__allMetrics || [];
      var order = window.__metricOrder || [];
      var checked = [];
      for (var i = 0; i < metrics.length; i++) {
        if (metrics[i].checked) checked.push(metrics[i]);
      }
      checked.sort(function(a, b) {
        var ai = order.indexOf(a.id);
        var bi = order.indexOf(b.id);
        if (ai === -1 && bi === -1) return 0;
        if (ai === -1) return 1;
        if (bi === -1) return -1;
        return ai - bi;
      });
      var html = '';
      for (var j = 0; j < checked.length; j++) {
        var m = checked[j];
        var periodDisp = m.type === '时点' ? '截至目前' : m.period;
        var bCls = ({'截至目前':'current','今日':'today','本周':'week','本月':'month','本季':'quarter','本年':'year','近30天':'d30','累计':'cum'})[periodDisp] || '';
        html += '<div class="metric-card sel-card-drag" draggable="true" data-id="' + m.id + '" ondragstart="onDragStart(event)" ondragover="onDragOver(event)" ondrop="onDrop(event)" ondragend="onDragEnd(event)" data-desc="' + (m.desc || '') + '" onmouseenter="showMetricTip(event,this.getAttribute(\'data-desc\'))" onmouseleave="hideMetricTip()">' +
          '<span class="sel-hover-remove" onclick="event.stopPropagation();removeSelected(\'' + m.id + '\')"><i data-lucide="x" width="10" height="10"></i></span>' +
          '<div class="mc-value"' + (m.valueColor ? ' style="color:' + m.valueColor + '"' : '') + '>' + m.value + '</div>' +
          '<div class="mc-label">' + m.label + '</div>' +
          '<div class="mc-period ' + bCls + '">' + periodDisp + '</div>' +
        '</div>';
      }
      document.getElementById('selectedMetricsList').innerHTML = html;
      lucide.createIcons();
    }

    // ─── 拖拽排序 ─────────────────────────────────────────────────
    var _dragId = null;

    function onDragStart(e) {
      _dragId = e.target.closest('.sel-card-drag').getAttribute('data-id');
      e.target.closest('.sel-card-drag').classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function onDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      var target = e.target.closest('.sel-card-drag');
      if (!target) return;
      // 判断鼠标在目标卡片的左半还是右半
      var rect = target.getBoundingClientRect();
      var x = e.clientX - rect.left;
      if (x < rect.width / 2) {
        target.classList.add('drag-before');
        target.classList.remove('drag-after');
      } else {
        target.classList.add('drag-after');
        target.classList.remove('drag-before');
      }
    }

    function onDrop(e) {
      e.preventDefault();
      var target = e.target.closest('.sel-card-drag');
      if (!target || !_dragId) return;
      var targetId = target.getAttribute('data-id');
      if (_dragId === targetId) return;
      var insertBefore = target.classList.contains('drag-before');
      // 更新顺序
      var order = window.__metricOrder || [];
      var idx = order.indexOf(_dragId);
      if (idx > -1) order.splice(idx, 1);
      var targetIdx = order.indexOf(targetId);
      if (targetIdx > -1) {
        order.splice(insertBefore ? targetIdx : targetIdx + 1, 0, _dragId);
      } else {
        order.push(_dragId);
      }
      window.__metricOrder = order;
      renderSelectedMetricsList();
    }

    function onDragEnd(e) {
      document.querySelectorAll('.sel-card-drag.dragging, .sel-card-drag.drag-before, .sel-card-drag.drag-after').forEach(function(c) {
        c.classList.remove('dragging', 'drag-before', 'drag-after');
      });
      _dragId = null;
    }

    function removeSelected(id) {
      var metrics = window.__allMetrics || [];
      for (var i = 0; i < metrics.length; i++) {
        if (metrics[i].id === id) {
          metrics[i].checked = false;
          break;
        }
      }
      renderMetricCheckboxes();
    }

    function setMetricFilter(filter) {
      window.__metricFilter = filter;
      renderMetricCheckboxes();
    }

    function setPeriodFilter(filter) {
      window.__metricPeriodFilter = filter;
      renderMetricCheckboxes();
    }

    function onMetricSearch() {
      var input = document.getElementById('metricSearchInput');
      window.__metricSearch = input ? input.value : '';
      renderMetricCheckboxes();
    }

    // ─── 指标说明浮层 ─────────────────────────────────────────────
    function showMetricTip(e, text) {
      if (!text) return;
      var tip = document.getElementById('metricTip');
      tip.textContent = text;
      tip.classList.add('show');
      // 更新位置跟随鼠标
      function moveTip(ev) {
        var x = ev.clientX + 14;
        var y = ev.clientY + 10;
        if (x + tip.offsetWidth > window.innerWidth - 8) x = ev.clientX - tip.offsetWidth - 14;
        if (y + tip.offsetHeight > window.innerHeight - 8) y = ev.clientY - tip.offsetHeight - 10;
        tip.style.left = x + 'px';
        tip.style.top = y + 'px';
      }
      moveTip(e);
      tip._moveHandler = moveTip;
      document.addEventListener('mousemove', moveTip);
    }

    function hideMetricTip() {
      var tip = document.getElementById('metricTip');
      if (tip._moveHandler) {
        document.removeEventListener('mousemove', tip._moveHandler);
        tip._moveHandler = null;
      }
      tip.classList.remove('show');
    }

    function toggleMiniCard(el) {
      el.classList.toggle('mc-active');
      el.classList.toggle('mc-dim');
      // 同步更新数据
      var id = el.getAttribute('data-id');
      var metrics = window.__allMetrics || [];
      for (var i = 0; i < metrics.length; i++) {
        if (metrics[i].id === id) {
          metrics[i].checked = el.classList.contains('mc-active');
          break;
        }
      }
      renderSelectedMetricsList();
    }

    function saveMetricConfig() {
      var metrics = window.__allMetrics || [];
      var prefs = {};
      for (var i = 0; i < metrics.length; i++) {
        prefs[metrics[i].id] = metrics[i].checked;
      }
      localStorage.setItem('yaq_metric_prefs', JSON.stringify(prefs));
      // 保存排序
      if (window.__metricOrder) {
        localStorage.setItem('yaq_metric_order', JSON.stringify(window.__metricOrder));
      }
      localStorage.setItem('yaq_metric_ver', 2);
      closeMetricConfig();
      // 重新渲染当前场景
      var sceneId = state.activeScene;
      var container = document.getElementById('sceneContent');
      var html = '';
      switch (sceneId) {
        case 'dashboard': html = renderDashboard(); break;
        case 'hazard-report': html = renderHazardReport(); break;
        case 'efficiency': html = renderEfficiency(); break;
        case 'responsibility': html = renderResponsibility(); break;
        case 'disposal': html = renderDisposal(); break;
      }
      container.innerHTML = html;
      lucide.createIcons();
      showToast('指标配置已保存');
    }

    // ════════════════════════════════════════════════════════════════
    // 渲染左栏场景列表
    // ════════════════════════════════════════════════════════════════

    function renderSceneList() {
      var scenes = [
        { id: 'dashboard', name: '今日监管工作台', icon: 'layout-dashboard', badge: { cls: 'danger', text: '3' } },
        { id: 'hazard-report', name: '重大隐患整改日报', icon: 'shield-alert', badge: { cls: 'danger', text: '5' } },
        { id: 'efficiency', name: '履职效能分析', icon: 'bar-chart-3', badge: { cls: 'orange', text: '2' } },
        { id: 'responsibility', name: '主体责任评估', icon: 'users', badge: { cls: 'orange', text: '8' } },
        { id: 'disposal', name: '分级处置闭环', icon: 'git-branch', badge: null }
      ];
      var html = '';
      for (var i = 0; i < scenes.length; i++) {
        var s = scenes[i];
        var active = s.id === state.activeScene ? ' active' : '';
        html += '<div class="nav-item' + active + '" data-scene="' + s.id + '">' +
          '<i data-lucide="' + s.icon + '" aria-hidden="true"></i>' +
          '<span>' + s.name + '</span>';
        if (s.badge) {
          html += '<span class="badge ' + s.badge.cls + '">' + s.badge.text + '</span>';
        }
        html += '</div>';
      }
      document.getElementById('sceneList').innerHTML = html;
      lucide.createIcons();
    }

    // ════════════════════════════════════════════════════════════════
    // INIT
    // ════════════════════════════════════════════════════════════════

    // Date
    var now = new Date();
    var dateStr = now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日';
    var weekdays = ['日','一','二','三','四','五','六'];
    document.getElementById('topbarDate').textContent = dateStr + ' 星期' + weekdays[now.getDay()];

    // Expose for onclick handlers
    window.switchScene = switchScene;
    window.showToast = showToast;
    window.openDrawer = openDrawer;
    window.agentAsk = agentAsk;
    window.openMetricConfig = openMetricConfig;
    window.closeMetricConfig = closeMetricConfig;
    window.saveMetricConfig = saveMetricConfig;
    window.toggleMiniCard = toggleMiniCard;
    window.cycleMetricPeriod = cycleMetricPeriod;
    window.setMetricFilter = setMetricFilter;
    window.setPeriodFilter = setPeriodFilter;
    window.onDragStart = onDragStart;
    window.onDragOver = onDragOver;
    window.onDrop = onDrop;
    window.onDragEnd = onDragEnd;
    window.removeSelected = removeSelected;
    window.onMetricSearch = onMetricSearch;
    window.showMetricTip = showMetricTip;
    window.hideMetricTip = hideMetricTip;

    // 渲染左栏场景列表
    renderSceneList();

    // Render default scene
    renderScene('dashboard');
    bindInteractions();

  })();
  </script>
</body>
</html>
