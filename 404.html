<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>页面未找到 — 站长每日监管闭环工作台</title>
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <style>
      body {
        display: grid;
        place-items: center;
        height: 100vh;
        height: 100dvh;
        text-align: center;
        padding: 20px;
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: var(--font-body);
      }
      h1 {
        font-size: 64px;
        color: var(--accent);
        margin: 0;
        line-height: 1;
      }
      p {
        color: var(--muted);
        margin: 8px 0 28px;
        font-size: 16px;
      }
      a {
        display: inline-block;
        padding: 10px 28px;
        background: var(--accent);
        color: #fff;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
        transition: opacity 0.15s;
      }
      a:hover {
        opacity: 0.85;
      }

      @media (max-width: 480px) {
        h1 {
          font-size: 40px;
        }
        p {
          font-size: 14px;
        }
        a {
          padding: 10px 24px;
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div>
      <h1>404</h1>
      <p>页面未找到</p>
      <a href="/yaq-ai/">返回工作台</a>
    </div>
  </body>
</html>
